# Velox — Outbound webhook delivery alerts
#
# Metrics source: internal/api/middleware/metrics.go (RecordWebhookDelivery).
#
# NOTE: outbox backlog size is not yet exported as a Prometheus gauge. Until
# that lands, operate the backlog alert via a postgres_exporter custom query
# — see the commented-out VeloxOutboxBacklog rule below.
groups:
  - name: velox_webhooks
    interval: 30s
    rules:
      - alert: VeloxWebhookFailureRate
        expr: |
          sum(rate(velox_webhook_deliveries_total{status="failed"}[15m]))
            / sum(rate(velox_webhook_deliveries_total[15m])) > 0.1
        for: 15m
        labels:
          severity: ticket
          service: velox
          domain: webhooks
        annotations:
          summary: "Velox outbound webhook failure rate >10%"
          description: "One bad customer endpoint skews global rate; also break down by destination to confirm it's not a Velox-side regression."
          runbook: docs/ops/runbook.md#playbook-veloxwebhookfailurerate

