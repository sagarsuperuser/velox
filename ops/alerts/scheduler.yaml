# Velox — Scheduler heartbeat alerts
#
# The scheduler last-run timestamp is surfaced via /health/ready, NOT as a
# Prometheus gauge (yet). These rules assume blackbox_exporter is probing
# /health/ready — see ops/alerts/README.md for the scrape config.
#
# When `velox_scheduler_last_run_timestamp_seconds` is instrumented, replace
# the probe_success expression with:
#
#   (time() - velox_scheduler_last_run_timestamp_seconds) > (2 * <interval>)
groups:
  - name: velox_scheduler
    interval: 30s
    rules:
      - alert: VeloxSchedulerStale
        expr: probe_success{job="velox_ready",instance=~".*/health/ready"} == 0
        for: 2m
        labels:
          severity: page
          service: velox
          domain: scheduler
        annotations:
          summary: "Velox /health/ready reporting unhealthy (scheduler likely stalled)"
          description: "Deep health check has been failing for 2m. Billing and dunning loops may not be running. Hit /health/ready directly to see the actual subsystem reporting unhealthy."
          runbook: docs/ops/runbook.md#playbook-veloxschedulerstale
