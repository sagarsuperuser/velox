# Velox — Payment + Stripe alerts
#
# Metrics source: internal/api/middleware/metrics.go (RecordPaymentCharge,
# RecordStripeBreakerState, RecordAutoChargeRetry).
groups:
  - name: velox_payments
    interval: 30s
    rules:
      - alert: VeloxStripeBreakerOpen
        expr: velox_stripe_breaker_state == 2
        for: 5m
        labels:
          severity: page
          service: velox
          domain: payments
        annotations:
          summary: "Velox Stripe circuit breaker OPEN"
          description: "Every payment attempt is being rejected fast without reaching Stripe. Check status.stripe.com and outbound network/DNS."
          runbook: docs/ops/runbook.md#playbook-veloxstripebreakeropen

      - alert: VeloxPaymentSuccessRateLow
        expr: |
          sum(rate(velox_payment_charges_total{result="succeeded"}[30m]))
            / sum(rate(velox_payment_charges_total[30m])) < 0.9
        for: 30m
        labels:
          severity: ticket
          service: velox
          domain: payments
          slo: payment_success
        annotations:
          summary: "Velox payment success rate <90% over 30m (SLO 95%)"
          description: "Success rate is {{ $value | humanizePercentage }}. Drill in by result label; dunning should be picking up the deltas."

      - alert: VeloxPaymentIntentFailureRate
        expr: |
          sum(rate(velox_payment_charges_total{result="failed"}[15m]))
            / sum(rate(velox_payment_charges_total[15m])) > 0.05
        for: 15m
        labels:
          severity: ticket
          service: velox
          domain: payments
        annotations:
          summary: "Velox PaymentIntent failure rate >5% (15m window)"
          description: "Sharper, shorter-window signal than VeloxPaymentSuccessRateLow. Something *changed* in the last 15m — new bad deploy, single-tenant Stripe credential expiry, or a batch of declines."
          runbook: docs/ops/runbook.md#playbook-veloxpaymentintentfailurerate
