key: openai_style
version: 3.0.0
name: OpenAI-style AI inference
summary: |
  Per-token billing across model × token_type for the GPT family plus
  embedding models. One multi-dim `tokens` meter. Designed for inference
  platforms reselling OpenAI API access.
description: |
  Models the public OpenAI pricing page: the current lineup (gpt-5.1,
  gpt-5, gpt-5-mini, gpt-5-nano, gpt-4.1, gpt-4.1-mini, gpt-4.1-nano)
  plus the legacy families proxies still route (gpt-4-turbo, gpt-4o,
  gpt-4o-mini, gpt-3.5-turbo) and three embedding models. Token billing
  is broken out by the `token_type` event dimension (ADR-044):

    - input        base input (uncached)
    - output       generated tokens
    - cache_read   cached-input hit (discounted; chat models only)

  OpenAI charges no separate cache-WRITE fee (prompt caching is automatic),
  so there are no cache_write_* roles here — unlike anthropic_style. Roles
  are DISJOINT, so each (model, token_type) is exactly one rule at equal
  priority; no boolean `cached` flag and no priority tie-break. The
  provider mapper normalizes OpenAI's cached_tokens (a SUBSET of
  prompt_tokens) into additive-disjoint input + cache_read quantities.
  Embedding models charge per input token only (matched by model alone).

  All flat amounts are cents PER TOKEN, carried as decimals (the meter is
  denominated in tokens). A published per-million price divides by 1,000,000:
  $10.00 / 1M = 0.001 cents/token (Stripe `unit_amount_decimal` model — sub-
  cent rates bill linearly and exactly). Operators override `currency`, the
  customer-facing `plan_name`, and the slug `plan_code` at instantiation.

overridable:
  - key: currency
    type: string
    default: USD
    enum: [USD, EUR, GBP]
  - key: plan_name
    type: string
    default: OpenAI-style API
    max_length: 80
  - key: plan_code
    type: string
    default: openai_api_pro
    pattern: '^[a-z][a-z0-9_]*$'

meters:
  - key: tokens
    name: Tokens
    unit: tokens
    aggregation: sum

rating_rules:
  # gpt-5.1 — input $1.25 / output $10 per million; cache read $0.125 (per-token)
  - key: gpt51_input
    name: GPT-5.1 input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000125'
  - key: gpt51_cache_read
    name: GPT-5.1 cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0000125'
  - key: gpt51_output
    name: GPT-5.1 output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.001'

  # gpt-5 — input $1.25 / output $10 per million; cache read $0.125 (per-token)
  - key: gpt5_input
    name: GPT-5 input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000125'
  - key: gpt5_cache_read
    name: GPT-5 cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0000125'
  - key: gpt5_output
    name: GPT-5 output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.001'

  # gpt-5-mini — input $0.25 / output $2 per million; cache read $0.025 (per-token)
  - key: gpt5_mini_input
    name: GPT-5 mini input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000025'
  - key: gpt5_mini_cache_read
    name: GPT-5 mini cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0000025'
  - key: gpt5_mini_output
    name: GPT-5 mini output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0002'

  # gpt-5-nano — input $0.05 / output $0.40 per million; cache read $0.005 (per-token)
  - key: gpt5_nano_input
    name: GPT-5 nano input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000005'
  - key: gpt5_nano_cache_read
    name: GPT-5 nano cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0000005'
  - key: gpt5_nano_output
    name: GPT-5 nano output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00004'

  # gpt-4.1 — input $2 / output $8 per million; cache read $0.50 (per-token)
  - key: gpt41_input
    name: GPT-4.1 input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0002'
  - key: gpt41_cache_read
    name: GPT-4.1 cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00005'
  - key: gpt41_output
    name: GPT-4.1 output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0008'

  # gpt-4.1-mini — input $0.40 / output $1.60 per million; cache read $0.10 (per-token)
  - key: gpt41_mini_input
    name: GPT-4.1 mini input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00004'
  - key: gpt41_mini_cache_read
    name: GPT-4.1 mini cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00001'
  - key: gpt41_mini_output
    name: GPT-4.1 mini output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00016'

  # gpt-4.1-nano — input $0.10 / output $0.40 per million; cache read $0.025 (per-token)
  - key: gpt41_nano_input
    name: GPT-4.1 nano input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00001'
  - key: gpt41_nano_cache_read
    name: GPT-4.1 nano cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0000025'
  - key: gpt41_nano_output
    name: GPT-4.1 nano output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00004'

  # ---- Legacy families (kept: proxies mid-migration still route them,
  # and the LiteLLM mapper still families them — dropping the rules
  # would leave that traffic unbilled at cycle close). ----

  # gpt-4-turbo — input $10 / output $30 per million; cache read $0.50 (per-token)
  - key: gpt4_turbo_input
    name: GPT-4 Turbo input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.001'
  - key: gpt4_turbo_cache_read
    name: GPT-4 Turbo cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00005'
  - key: gpt4_turbo_output
    name: GPT-4 Turbo output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.003'

  # gpt-4o — input $2.50 / output $10 per million; cache read $1.25 (per-token)
  - key: gpt4o_input
    name: GPT-4o input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00025'
  - key: gpt4o_cache_read
    name: GPT-4o cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000125'
  - key: gpt4o_output
    name: GPT-4o output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.001'

  # gpt-4o-mini — input $0.15 / output $0.60 per million; cache read $0.075 (per-token).
  # Decimal carries the exact $0.075/M cache rate (0.0000075), not the old rounded 7c/M.
  - key: gpt4o_mini_input
    name: GPT-4o mini input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000015'
  - key: gpt4o_mini_cache_read
    name: GPT-4o mini cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0000075'
  - key: gpt4o_mini_output
    name: GPT-4o mini output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00006'

  # gpt-3.5-turbo — $0.50 / $1.50 per million (no public cache rate) (per-token)
  - key: gpt35_turbo_input
    name: GPT-3.5 Turbo input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00005'
  - key: gpt35_turbo_output
    name: GPT-3.5 Turbo output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00015'

  # Embeddings — per million input tokens, no output rate (per-token).
  - key: embed_3_small
    name: text-embedding-3-small
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000002'
  - key: embed_3_large
    name: text-embedding-3-large
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000013'
  - key: embed_ada_002
    name: text-embedding-ada-002
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00001'

# Disjoint token roles → one rule per (model, token_type) at equal priority.
pricing_rules:
  - meter: tokens
    rating_rule: gpt51_input
    dimension_match: { model: gpt-5.1, token_type: input }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: gpt51_cache_read
    dimension_match: { model: gpt-5.1, token_type: cache_read }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: gpt51_output
