key: replicate_style
version: 2.0.0
name: GPU compute pricing (per-second)
summary: |
  Ready-made pricing for reselling GPU compute. Bills each customer per
  second of GPU time, at a separate rate for each GPU type (H100, A100,
  A40, T4, CPU), on a monthly plan.
description: |
  Sets up everything you need to bill customers for GPU compute time:

    • A usage meter that counts GPU-seconds. Each event you send must
      carry the seconds consumed since that job's previous report (a
      per-interval delta), not a cumulative running total — the meter
      sums deltas, and cumulative totals would under-bill whenever two
      jobs share a GPU class
    • A per-second price for each GPU type — H100, A100 (80GB), A40, T4,
      and CPU
    • A monthly plan your customers subscribe to
    • Automatic payment retries and a notifications endpoint you can point
      at your own systems

  Prices start at Replicate's public per-second rates — a starting point
  you'll edit to your own margins after setup. Before installing, you can
  set the currency and the plan's name.

overridable:
  - key: currency
    type: string
    default: USD
    enum: [USD, EUR, GBP]
  - key: plan_name
    type: string
    default: GPU Compute
    max_length: 80
  - key: plan_code
    type: string
    default: gpu_compute_pro
    pattern: '^[a-z][a-z0-9_]*$'

meters:
  - key: gpu_seconds
    name: GPU seconds
    unit: seconds
    aggregation: sum

# Rates in cents per second (decimal — sub-cent rates bill linearly and
# exactly): $0.001525/s = 0.1525¢/s.
rating_rules:
  - key: gpu_h100
    name: NVIDIA H100 per-second
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.1525'
  - key: gpu_a100
    name: NVIDIA A100 (80GB) per-second
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.14'
  - key: gpu_a40
    name: NVIDIA A40 per-second
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0575'
  - key: gpu_t4
    name: NVIDIA T4 per-second
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0225'
  - key: cpu
    name: CPU-only per-second
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.01'

# sum of per-interval deltas — see description; last_during_period on
# cumulative totals under-bills the moment two jobs share a GPU class.
pricing_rules:
  - meter: gpu_seconds
    rating_rule: gpu_h100
    dimension_match: { gpu_type: h100 }
    aggregation_mode: sum
    priority: 100
  - meter: gpu_seconds
    rating_rule: gpu_a100
    dimension_match: { gpu_type: a100 }
    aggregation_mode: sum
    priority: 100
  - meter: gpu_seconds
    rating_rule: gpu_a40
    dimension_match: { gpu_type: a40 }
    aggregation_mode: sum
    priority: 100
  - meter: gpu_seconds
    rating_rule: gpu_t4
    dimension_match: { gpu_type: t4 }
    aggregation_mode: sum
    priority: 100
  - meter: gpu_seconds
    rating_rule: cpu
    dimension_match: { gpu_type: cpu }
    aggregation_mode: sum
    priority: 100

plans:
  - code: '{{ .plan_code }}'
    name: '{{ .plan_name }}'
    currency: '{{ .currency }}'
    billing_interval: monthly
    base_amount_cents: 0
    meters: [gpu_seconds]

dunning:
  policy:
    name: GPU compute retry
    max_retries: 4
    intervals_hours: [24, 72, 168, 336]
    final_action: pause

webhook:
  events:
    - invoice.finalized
    - invoice.paid
    - payment.failed
    - subscription.item.updated
    - subscription.canceled
  url_placeholder: 'https://example.com/webhooks/velox'
