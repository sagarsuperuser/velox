key: anthropic_style
version: 2.0.0
name: Anthropic-style AI inference
summary: |
  Per-token billing across model × token_type. One multi-dim `tokens` meter;
  five disjoint token roles per model (input, output, cache_read,
  cache_write_5m, cache_write_1h). Monthly billing. For inference platforms
  reselling LLM API access.
description: |
  Models the public Anthropic pricing page: claude-3.5-sonnet,
  claude-3-opus, claude-3-sonnet, claude-3-haiku, billed
  per-million-tokens. Each model carries five token roles, matching how
  Anthropic itemizes and prices token usage (ADR-044):

    - input          base input (uncached)
    - output         generated tokens
    - cache_read     prompt-cache hit            (0.1× input)
    - cache_write_5m  5-minute cache write       (1.25× input)
    - cache_write_1h  1-hour cache write         (2× input)

  Roles live in the `token_type` event dimension and are DISJOINT, so each
  (model, token_type) pair is exactly one rule at equal priority — no
  priority tie-breaking and no boolean `cached` flag (a boolean can't
  distinguish read from 5m-write from 1h-write, which are three prices).
  Each provider mapper (e.g. LiteLLM) is responsible for emitting these
  roles as additive-disjoint quantities; the engine never does role math.

  Cache rates are derived from each model's input rate (0.1× / 1.25× / 2×);
  sub-cent-per-million values are rounded to the nearest cent. All amounts
  are cents per million tokens. Operators override `currency`, `plan_name`,
  and `plan_code` at instantiation; the rest is fixed for v1.

overridable:
  - key: currency
    type: string
    default: USD
    enum: [USD, EUR, GBP]
  - key: plan_name
    type: string
    default: AI API
    max_length: 80
  - key: plan_code
    type: string
    default: ai_api_pro
    pattern: '^[a-z][a-z0-9_]*$'

meters:
  - key: tokens
    name: Tokens
    unit: tokens
    aggregation: sum

rating_rules:
  # Claude 3.5 Sonnet — input $3.00 / output $15.00 per million.
  - key: c35_sonnet_input
    name: Claude 3.5 Sonnet input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 300
  - key: c35_sonnet_output
    name: Claude 3.5 Sonnet output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 1500
  - key: c35_sonnet_cache_read
    name: Claude 3.5 Sonnet cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 30
  - key: c35_sonnet_cache_write_5m
    name: Claude 3.5 Sonnet cache write (5m)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 375
  - key: c35_sonnet_cache_write_1h
    name: Claude 3.5 Sonnet cache write (1h)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 600

  # Claude 3 Opus — input $15.00 / output $75.00 per million.
  - key: opus_input
    name: Claude 3 Opus input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 1500
  - key: opus_output
    name: Claude 3 Opus output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 7500
  - key: opus_cache_read
    name: Claude 3 Opus cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 150
  - key: opus_cache_write_5m
    name: Claude 3 Opus cache write (5m)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 1875
  - key: opus_cache_write_1h
    name: Claude 3 Opus cache write (1h)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 3000

  # Claude 3 Sonnet — input $3.00 / output $15.00 per million.
  - key: sonnet_input
    name: Claude 3 Sonnet input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 300
  - key: sonnet_output
    name: Claude 3 Sonnet output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 1500
  - key: sonnet_cache_read
    name: Claude 3 Sonnet cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 30
  - key: sonnet_cache_write_5m
    name: Claude 3 Sonnet cache write (5m)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 375
  - key: sonnet_cache_write_1h
    name: Claude 3 Sonnet cache write (1h)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 600

  # Claude 3 Haiku — input $0.25 / output $1.25 per million. Cache rates
  # round to the cent (0.1×/1.25×/2× of 25 = 2.5/31.25/50 → 3/31/50).
  - key: haiku_input
    name: Claude 3 Haiku input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 25
  - key: haiku_output
    name: Claude 3 Haiku output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 125
  - key: haiku_cache_read
    name: Claude 3 Haiku cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 3
  - key: haiku_cache_write_5m
    name: Claude 3 Haiku cache write (5m)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 31
  - key: haiku_cache_write_1h
    name: Claude 3 Haiku cache write (1h)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: 50

# Disjoint token roles → one rule per (model, token_type) at equal priority.
pricing_rules:
  - meter: tokens
    rating_rule: c35_sonnet_input
    dimension_match: { model: claude-3.5-sonnet, token_type: input }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: c35_sonnet_output
    dimension_match: { model: claude-3.5-sonnet, token_type: output }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: c35_sonnet_cache_read
    dimension_match: { model: claude-3.5-sonnet, token_type: cache_read }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: c35_sonnet_cache_write_5m
    dimension_match: { model: claude-3.5-sonnet, token_type: cache_write_5m }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: c35_sonnet_cache_write_1h
    dimension_match: { model: claude-3.5-sonnet, token_type: cache_write_1h }
    aggregation_mode: sum
    priority: 100

  - meter: tokens
    rating_rule: opus_input
    dimension_match: { model: claude-3-opus, token_type: input }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: opus_output
    dimension_match: { model: claude-3-opus, token_type: output }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: opus_cache_read
    dimension_match: { model: claude-3-opus, token_type: cache_read }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: opus_cache_write_5m
    dimension_match: { model: claude-3-opus, token_type: cache_write_5m }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: opus_cache_write_1h
    dimension_match: { model: claude-3-opus, token_type: cache_write_1h }
    aggregation_mode: sum
    priority: 100

  - meter: tokens
    rating_rule: sonnet_input
    dimension_match: { model: claude-3-sonnet, token_type: input }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: sonnet_output
    dimension_match: { model: claude-3-sonnet, token_type: output }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: sonnet_cache_read
    dimension_match: { model: claude-3-sonnet, token_type: cache_read }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: sonnet_cache_write_5m
    dimension_match: { model: claude-3-sonnet, token_type: cache_write_5m }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: sonnet_cache_write_1h
    dimension_match: { model: claude-3-sonnet, token_type: cache_write_1h }
    aggregation_mode: sum
    priority: 100

  - meter: tokens
    rating_rule: haiku_input
    dimension_match: { model: claude-3-haiku, token_type: input }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: haiku_output
    dimension_match: { model: claude-3-haiku, token_type: output }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: haiku_cache_read
    dimension_match: { model: claude-3-haiku, token_type: cache_read }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: haiku_cache_write_5m
    dimension_match: { model: claude-3-haiku, token_type: cache_write_5m }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: haiku_cache_write_1h
    dimension_match: { model: claude-3-haiku, token_type: cache_write_1h }
    aggregation_mode: sum
    priority: 100

plans:
  - code: '{{ .plan_code }}'
    name: '{{ .plan_name }}'
    currency: '{{ .currency }}'
    billing_interval: monthly
    base_amount_cents: 0
    meters: [tokens]

dunning:
  policy:
    name: AI default retry
    max_retries: 4
    intervals_hours: [24, 72, 168, 336]
    final_action: pause

webhook:
  events:
    - invoice.finalized
    - invoice.paid
    - invoice.payment_failed
    - subscription.updated
    - subscription.canceled
  url_placeholder: 'https://example.com/webhooks/velox'

sample_data:
  customer:
    external_id: demo-customer
    display_name: Demo Customer
    email: demo@example.com
  subscription:
    plan: '{{ .plan_code }}'
    trial_days: 14
