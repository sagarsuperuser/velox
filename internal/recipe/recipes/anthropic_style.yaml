  - meter: tokens
    rating_rule: haiku45_input
    dimension_match: { model: claude-haiku-4.5, token_type: input }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: haiku45_output
    dimension_match: { model: claude-haiku-4.5, token_type: output }
    aggregation_mode: sum
