key: anthropic_style
version: 3.0.0
name: Anthropic-style AI inference
summary: |
  Per-token billing across model × token_type. One multi-dim `tokens` meter;
  five disjoint token roles per model (input, output, cache_read,
  cache_write_5m, cache_write_1h). Monthly billing. For inference platforms
  reselling LLM API access.
description: |
  Models the public Anthropic pricing page: the current 4.5 generation
  (claude-opus-4.5, claude-sonnet-4.5, claude-haiku-4.5) plus the legacy
  claude-3.x families still carried by proxies mid-migration
  (claude-3.5-sonnet, claude-3-opus, claude-3-sonnet, claude-3-haiku),
  billed per-million-tokens. Each model carries five token roles,
  matching how Anthropic itemizes and prices token usage (ADR-044):

    - input          base input (uncached)
    - output         generated tokens
    - cache_read     prompt-cache hit            (0.1× input)
    - cache_write_5m  5-minute cache write       (1.25× input)
    - cache_write_1h  1-hour cache write         (2× input)

  Roles live in the `token_type` event dimension and are DISJOINT, so each
  (model, token_type) pair is exactly one rule at equal priority — no
  priority tie-breaking and no boolean `cached` flag (a boolean can't
  distinguish read from 5m-write from 1h-write, which are three prices).
  Each provider mapper (e.g. LiteLLM) is responsible for emitting these
  roles as additive-disjoint quantities; the engine never does role math.

  Cache rates are derived from each model's input rate (0.1× / 1.25× / 2×).
  All flat amounts are cents PER TOKEN, carried as decimals (the meter is
  denominated in tokens). A published per-million price divides by 1,000,000:
  $3.00 / 1M tokens = 300 cents / 1,000,000 = 0.0003 cents/token. This is the
  Stripe `unit_amount_decimal` model — sub-cent rates bill linearly and
  exactly, with no per-million rounding. Operators override `currency`,
  `plan_name`, and `plan_code` at instantiation; the rest is fixed for v1.

overridable:
  - key: currency
    type: string
    default: USD
    enum: [USD, EUR, GBP]
  - key: plan_name
    type: string
    default: AI API
    max_length: 80
  - key: plan_code
    type: string
    default: ai_api_pro
    pattern: '^[a-z][a-z0-9_]*$'

meters:
  - key: tokens
    name: Tokens
    unit: tokens
    aggregation: sum

rating_rules:
  # Claude Opus 4.5 — input $5.00 / output $25.00 per million (per-token).
  # Cache multiples as everywhere: read 0.1×, 5m write 1.25×, 1h write 2×.
  - key: opus45_input
    name: Claude Opus 4.5 input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0005'
  - key: opus45_output
    name: Claude Opus 4.5 output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0025'
  - key: opus45_cache_read
    name: Claude Opus 4.5 cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00005'
  - key: opus45_cache_write_5m
    name: Claude Opus 4.5 cache write (5m)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000625'
  - key: opus45_cache_write_1h
    name: Claude Opus 4.5 cache write (1h)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.001'

  # Claude Sonnet 4.5 — input $3.00 / output $15.00 per million (per-token).
  - key: sonnet45_input
    name: Claude Sonnet 4.5 input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0003'
  - key: sonnet45_output
    name: Claude Sonnet 4.5 output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0015'
  - key: sonnet45_cache_read
    name: Claude Sonnet 4.5 cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00003'
  - key: sonnet45_cache_write_5m
    name: Claude Sonnet 4.5 cache write (5m)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000375'
  - key: sonnet45_cache_write_1h
    name: Claude Sonnet 4.5 cache write (1h)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0006'

  # Claude Haiku 4.5 — input $1.00 / output $5.00 per million (per-token).
  - key: haiku45_input
    name: Claude Haiku 4.5 input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0001'
  - key: haiku45_output
    name: Claude Haiku 4.5 output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0005'
  - key: haiku45_cache_read
    name: Claude Haiku 4.5 cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00001'
  - key: haiku45_cache_write_5m
    name: Claude Haiku 4.5 cache write (5m)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000125'
  - key: haiku45_cache_write_1h
    name: Claude Haiku 4.5 cache write (1h)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0002'

  # ---- Legacy claude-3.x families (kept: proxies mid-migration still
  # route them, and the LiteLLM mapper still families them — dropping the
  # rules here would leave that traffic unbilled at cycle close). ----

  # Claude 3.5 Sonnet — input $3.00 / output $15.00 per million (per-token).
  - key: c35_sonnet_input
    name: Claude 3.5 Sonnet input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0003'
  - key: c35_sonnet_output
    name: Claude 3.5 Sonnet output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0015'
  - key: c35_sonnet_cache_read
    name: Claude 3.5 Sonnet cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00003'
  - key: c35_sonnet_cache_write_5m
    name: Claude 3.5 Sonnet cache write (5m)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000375'
  - key: c35_sonnet_cache_write_1h
    name: Claude 3.5 Sonnet cache write (1h)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0006'

  # Claude 3 Opus — input $15.00 / output $75.00 per million (per-token).
  - key: opus_input
    name: Claude 3 Opus input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0015'
  - key: opus_output
    name: Claude 3 Opus output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0075'
  - key: opus_cache_read
    name: Claude 3 Opus cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00015'
  - key: opus_cache_write_5m
    name: Claude 3 Opus cache write (5m)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.001875'
  - key: opus_cache_write_1h
    name: Claude 3 Opus cache write (1h)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.003'

  # Claude 3 Sonnet — input $3.00 / output $15.00 per million (per-token).
  - key: sonnet_input
    name: Claude 3 Sonnet input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0003'
  - key: sonnet_output
    name: Claude 3 Sonnet output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0015'
  - key: sonnet_cache_read
    name: Claude 3 Sonnet cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00003'
  - key: sonnet_cache_write_5m
    name: Claude 3 Sonnet cache write (5m)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000375'
  - key: sonnet_cache_write_1h
    name: Claude 3 Sonnet cache write (1h)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0006'

  # Claude 3 Haiku — input $0.25 / output $1.25 per million (per-token).
  # Decimal rates carry the exact derived cache multiples (no rounding):
  # cache_read 0.1×, cache_write_5m 1.25×, cache_write_1h 2× of input.
  - key: haiku_input
    name: Claude 3 Haiku input
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000025'
  - key: haiku_output
    name: Claude 3 Haiku output
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.000125'
  - key: haiku_cache_read
    name: Claude 3 Haiku cache read
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.0000025'
  - key: haiku_cache_write_5m
    name: Claude 3 Haiku cache write (5m)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00003125'
  - key: haiku_cache_write_1h
    name: Claude 3 Haiku cache write (1h)
    mode: flat
    currency: '{{ .currency }}'
    flat_amount_cents: '0.00005'

# Disjoint token roles → one rule per (model, token_type) at equal priority.
pricing_rules:
  - meter: tokens
    rating_rule: opus45_input
    dimension_match: { model: claude-opus-4.5, token_type: input }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: opus45_output
    dimension_match: { model: claude-opus-4.5, token_type: output }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: opus45_cache_read
    dimension_match: { model: claude-opus-4.5, token_type: cache_read }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: opus45_cache_write_5m
    dimension_match: { model: claude-opus-4.5, token_type: cache_write_5m }
    aggregation_mode: sum
    priority: 100
  - meter: tokens
    rating_rule: opus45_cache_write_1h
    dimension_match: { model: claude-opus-4.5, token_type: cache_write_1h }
