    aggregation_mode: sum
    priority: 100

plans:
  - code: '{{ .plan_code }}'
    name: '{{ .plan_name }}'
    currency: '{{ .currency }}'
    billing_interval: monthly
    base_amount_cents: 0
    meters: [tokens]

dunning:
  policy:
    name: AI default retry
    max_retries: 4
    intervals_hours: [24, 72, 168, 336]
    final_action: pause

webhook:
  events:
    - invoice.finalized
    - invoice.paid
    - payment.failed
    - subscription.item.updated
    - subscription.canceled
  url_placeholder: 'https://example.com/webhooks/velox'
