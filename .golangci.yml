run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
  disable:
    - exhaustive
    - wrapcheck

linters-settings:
  errcheck:
    check-blank: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - text: "Error return value of .*(Close|Write|Encode)"
      linters:
        - errcheck
