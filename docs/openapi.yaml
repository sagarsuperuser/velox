openapi: 3.0.3
info:
  title: Velox Billing API
  description: |
    Usage-based billing engine with pricing, subscriptions, usage metering,
    invoice generation, Stripe payments, dunning, and customer credits.
  version: 1.0.0
  contact:
    name: Velox
    url: https://github.com/sagarsuperuser/velox

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.velox.dev
    description: Production

security:
  - ApiKeyAuth: []

tags:
  - name: Customers
    description: Customer lifecycle and billing profiles
  - name: Subscriptions
    description: Subscription management and lifecycle
  - name: Invoices
    description: Invoice generation, finalization, and payment
  - name: Pricing
    description: Plans, meters, and rating rules
  - name: Usage
    description: Usage event ingestion and aggregation
  - name: Credits
    description: Prepaid credit ledger operations
  - name: Credit Notes
    description: Refunds and credit notes on invoices
  - name: Coupons
    description: Discount coupon management and redemption
  - name: Dunning
    description: Payment failure recovery and retry
  - name: Webhooks
    description: Outbound webhook endpoint management
  - name: Audit
    description: Audit log queries
  - name: Settings
    description: Tenant configuration
  - name: Billing
    description: Billing engine operations
  - name: Analytics
    description: Revenue and usage analytics

paths:
  # --- Customers ---
  /v1/customers:
    post:
      tags: [Customers]
      summary: Create a customer
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [external_id, display_name]
              properties:
                external_id:
                  type: string
                  example: cus_stripe_123
                display_name:
                  type: string
                  example: Acme Corp
                email:
                  type: string
                  format: email
                  example: billing@acme.com
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '409':
          description: Customer with this external_id already exists
        '422':
          description: Validation error
    get:
      tags: [Customers]
      summary: List customers
      operationId: listCustomers
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
      responses:
        '200':
          description: List of customers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Customer'
                  total:
                    type: integer

  /v1/customers/{id}:
    get:
      tags: [Customers]
      summary: Get a customer
      operationId: getCustomer
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Customer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          description: Customer not found
    patch:
      tags: [Customers]
      summary: Update a customer
      operationId: updateCustomer
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                email:
                  type: string
                status:
                  type: string
                  enum: [active, archived]
      responses:
        '200':
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'

  /v1/customers/{id}/billing-profile:
    put:
      tags: [Customers]
      summary: Create or update billing profile
      operationId: upsertBillingProfile
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingProfileInput'
      responses:
        '200':
          description: Billing profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingProfile'
    get:
      tags: [Customers]
      summary: Get billing profile
      operationId: getBillingProfile
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Billing profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingProfile'

  /v1/customers/{id}/export:
    get:
      tags: [Customers]
      summary: Export all customer data (GDPR)
      operationId: exportCustomerData
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Full data export
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: '#/components/schemas/Customer'
                  billing_profile:
                    $ref: '#/components/schemas/BillingProfile'
                  invoices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
                  subscriptions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subscription'

  /v1/customers/{id}/delete-data:
    post:
      tags: [Customers]
      summary: Anonymize and archive customer (GDPR)
      operationId: deleteCustomerData
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Customer anonymized
        '422':
          description: Customer has active subscriptions

  # --- Plans ---
  /v1/plans:
    post:
      tags: [Pricing]
      summary: Create a plan
      operationId: createPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name, currency, billing_interval]
              properties:
                code:
                  type: string
                  example: pro-monthly
                name:
                  type: string
                  example: Pro Monthly
                currency:
                  type: string
                  example: usd
                billing_interval:
                  type: string
                  enum: [monthly, yearly]
                base_amount_cents:
                  type: integer
                  format: int64
                  example: 9900
                meter_ids:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
    get:
      tags: [Pricing]
      summary: List plans
      operationId: listPlans
      responses:
        '200':
          description: List of plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Plan'

  /v1/plans/{id}:
    get:
      tags: [Pricing]
      summary: Get a plan
      operationId: getPlan
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Plan details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'

  # --- Meters ---
  /v1/meters:
    post:
      tags: [Pricing]
      summary: Create a meter
      operationId: createMeter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, name, unit, aggregation]
              properties:
                key:
                  type: string
                  example: api_calls
                name:
                  type: string
                  example: API Calls
                unit:
                  type: string
                  example: calls
                aggregation:
                  type: string
                  enum: [sum, max, last, count]
                rating_rule_version_id:
                  type: string
      responses:
        '201':
          description: Meter created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meter'
    get:
      tags: [Pricing]
      summary: List meters
      operationId: listMeters
      responses:
        '200':
          description: List of meters
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Meter'

  # --- Rating Rules ---
  /v1/rating-rules:
    post:
      tags: [Pricing]
      summary: Create a rating rule version
      operationId: createRatingRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rule_key, name, mode, currency]
              properties:
                rule_key:
                  type: string
                  example: api-calls-pricing
                name:
                  type: string
                mode:
                  type: string
                  enum: [flat, graduated, package]
                currency:
                  type: string
                flat_amount_cents:
                  type: integer
                  format: int64
                graduated_tiers:
                  type: array
                  items:
                    $ref: '#/components/schemas/RatingTier'
                package_size:
                  type: integer
                  format: int64
                package_amount_cents:
                  type: integer
                  format: int64
                overage_unit_amount_cents:
                  type: integer
                  format: int64
      responses:
        '201':
          description: Rating rule created
    get:
      tags: [Pricing]
      summary: List rating rules
      operationId: listRatingRules
      responses:
        '200':
          description: List of rating rule versions

  # --- Subscriptions ---
  /v1/subscriptions:
    post:
      tags: [Subscriptions]
      summary: Create a subscription
      operationId: createSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, plan_id]
              properties:
                customer_id:
                  type: string
                plan_id:
                  type: string
                trial_end_at:
                  type: string
                  format: date-time
                usage_cap_units:
                  type: integer
                  format: int64
                overage_action:
                  type: string
                  enum: [block, charge]
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
    get:
      tags: [Subscriptions]
      summary: List subscriptions
      operationId: listSubscriptions
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: customer_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, paused, cancelled]
      responses:
        '200':
          description: List of subscriptions

  /v1/subscriptions/{id}:
    get:
      tags: [Subscriptions]
      summary: Get a subscription
      operationId: getSubscription
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'

  /v1/subscriptions/{id}/activate:
    post:
      tags: [Subscriptions]
      summary: Activate a draft subscription
      operationId: activateSubscription
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Subscription activated

  /v1/subscriptions/{id}/cancel:
    post:
      tags: [Subscriptions]
      summary: Cancel a subscription
      operationId: cancelSubscription
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Subscription cancelled

  /v1/subscriptions/{id}/pause:
    post:
      tags: [Subscriptions]
      summary: Pause a subscription
      operationId: pauseSubscription
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Subscription paused

  /v1/subscriptions/{id}/resume:
    post:
      tags: [Subscriptions]
      summary: Resume a paused subscription
      operationId: resumeSubscription
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Subscription resumed

  /v1/subscriptions/{id}/change-plan:
    post:
      tags: [Subscriptions]
      summary: Change the subscription plan
      operationId: changePlan
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [plan_id]
              properties:
                plan_id:
                  type: string
                effective:
                  type: string
                  enum: [immediately, at_period_end]
                  default: immediately
      responses:
        '200':
          description: Plan changed

  # --- Usage Events ---
  /v1/usage-events:
    post:
      tags: [Usage]
      summary: Ingest a usage event
      operationId: ingestUsageEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, meter_id, quantity]
              properties:
                customer_id:
                  type: string
                meter_id:
                  type: string
                quantity:
                  type: integer
                  format: int64
                  example: 150
                timestamp:
                  type: string
                  format: date-time
                idempotency_key:
                  type: string
                properties:
                  type: object
      responses:
        '201':
          description: Event ingested
        '409':
          description: Duplicate idempotency key
    get:
      tags: [Usage]
      summary: List usage events
      operationId: listUsageEvents
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: customer_id
          in: query
          schema:
            type: string
        - name: meter_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of events

  /v1/usage-events/batch:
    post:
      tags: [Usage]
      summary: Ingest multiple usage events
      operationId: batchIngestUsageEvents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  maxItems: 1000
                  items:
                    type: object
                    required: [customer_id, meter_id, quantity]
                    properties:
                      customer_id:
                        type: string
                      meter_id:
                        type: string
                      quantity:
                        type: integer
                        format: int64
                      timestamp:
                        type: string
                        format: date-time
                      idempotency_key:
                        type: string
      responses:
        '200':
          description: Batch result
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
                  rejected:
                    type: integer

  # --- Invoices ---
  /v1/invoices:
    get:
      tags: [Invoices]
      summary: List invoices
      operationId: listInvoices
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: customer_id
          in: query
          schema:
            type: string
        - name: subscription_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, finalized, paid, voided]
        - name: payment_status
          in: query
          schema:
            type: string
            enum: [pending, processing, succeeded, failed]
      responses:
        '200':
          description: List of invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
                  total:
                    type: integer

  /v1/invoices/{id}:
    get:
      tags: [Invoices]
      summary: Get an invoice with line items
      operationId: getInvoice
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Invoice with line items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Invoice'
                  - type: object
                    properties:
                      line_items:
                        type: array
                        items:
                          $ref: '#/components/schemas/InvoiceLineItem'

  /v1/invoices/{id}/void:
    post:
      tags: [Invoices]
      summary: Void an invoice
      operationId: voidInvoice
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Invoice voided

  /v1/invoices/{id}/mark-paid:
    post:
      tags: [Invoices]
      summary: Mark an invoice as paid
      operationId: markInvoicePaid
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Invoice marked as paid

  /v1/invoices/{id}/pdf:
    get:
      tags: [Invoices]
      summary: Download invoice PDF
      operationId: getInvoicePDF
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  # --- Credits ---
  /v1/credits/grant:
    post:
      tags: [Credits]
      summary: Grant credits to a customer
      operationId: grantCredits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, amount_cents]
              properties:
                customer_id:
                  type: string
                amount_cents:
                  type: integer
                  format: int64
                  example: 5000
                description:
                  type: string
                  example: Welcome bonus
                expires_at:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Credits granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditLedgerEntry'

  /v1/credits/balance/{customer_id}:
    get:
      tags: [Credits]
      summary: Get credit balance for a customer
      operationId: getCreditBalance
      parameters:
        - name: customer_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Credit balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditBalance'

  /v1/credits/ledger/{customer_id}:
    get:
      tags: [Credits]
      summary: List credit ledger entries
      operationId: listCreditLedger
      parameters:
        - name: customer_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Credit ledger entries

  # --- Coupons ---
  /v1/coupons:
    post:
      tags: [Coupons]
      summary: Create a coupon
      operationId: createCoupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name, type]
              properties:
                code:
                  type: string
                  example: WELCOME20
                name:
                  type: string
                type:
                  type: string
                  enum: [percentage, fixed_amount]
                percent_off:
                  type: number
                  example: 20
                amount_off:
                  type: integer
                  format: int64
                currency:
                  type: string
                max_redemptions:
                  type: integer
                expires_at:
                  type: string
                  format: date-time
                plan_ids:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Coupon created
    get:
      tags: [Coupons]
      summary: List coupons
      operationId: listCoupons
      responses:
        '200':
          description: List of coupons

  /v1/coupons/redeem:
    post:
      tags: [Coupons]
      summary: Redeem a coupon
      operationId: redeemCoupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, customer_id, subtotal_cents]
              properties:
                code:
                  type: string
                customer_id:
                  type: string
                subscription_id:
                  type: string
                invoice_id:
                  type: string
                plan_id:
                  type: string
                subtotal_cents:
                  type: integer
                  format: int64
      responses:
        '200':
          description: Redemption result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponRedemption'

  # --- Credit Notes ---
  /v1/credit-notes:
    post:
      tags: [Credit Notes]
      summary: Create a credit note on an invoice
      operationId: createCreditNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoice_id, reason]
              properties:
                invoice_id:
                  type: string
                reason:
                  type: string
                line_items:
                  type: array
                  items:
                    type: object
                    properties:
                      description:
                        type: string
                      amount_cents:
                        type: integer
                        format: int64
      responses:
        '201':
          description: Credit note created

  # --- Dunning ---
  /v1/dunning/policy:
    get:
      tags: [Dunning]
      summary: Get dunning policy
      operationId: getDunningPolicy
      responses:
        '200':
          description: Dunning policy
    put:
      tags: [Dunning]
      summary: Update dunning policy
      operationId: updateDunningPolicy
      responses:
        '200':
          description: Policy updated

  /v1/dunning/runs:
    get:
      tags: [Dunning]
      summary: List active dunning runs
      operationId: listDunningRuns
      responses:
        '200':
          description: List of dunning runs

  # --- Webhook Endpoints ---
  /v1/webhook-endpoints:
    post:
      tags: [Webhooks]
      summary: Create a webhook endpoint
      operationId: createWebhookEndpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                  example: https://example.com/webhooks
                description:
                  type: string
                events:
                  type: array
                  items:
                    type: string
                  example: ["invoice.created", "payment.succeeded"]
      responses:
        '201':
          description: Endpoint created (signing secret returned once)
    get:
      tags: [Webhooks]
      summary: List webhook endpoints
      operationId: listWebhookEndpoints
      responses:
        '200':
          description: List of endpoints

  # --- Audit ---
  /v1/audit-log:
    get:
      tags: [Audit]
      summary: Query audit log
      operationId: queryAuditLog
      parameters:
        - name: resource_type
          in: query
          schema:
            type: string
        - name: resource_id
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Audit entries

  # --- Settings ---
  /v1/settings:
    get:
      tags: [Settings]
      summary: Get tenant settings
      operationId: getSettings
      responses:
        '200':
          description: Tenant settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSettings'
    put:
      tags: [Settings]
      summary: Update tenant settings
      operationId: updateSettings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantSettings'
      responses:
        '200':
          description: Updated settings

  # --- Billing ---
  /v1/billing/run:
    post:
      tags: [Billing]
      summary: Manually trigger a billing cycle
      operationId: triggerBillingCycle
      responses:
        '200':
          description: Billing cycle result
          content:
            application/json:
              schema:
                type: object
                properties:
                  generated:
                    type: integer
                  errors:
                    type: integer

  /v1/billing/preview/{subscription_id}:
    get:
      tags: [Billing]
      summary: Preview the next invoice for a subscription
      operationId: previewInvoice
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice preview

  # --- Analytics ---
  /v1/analytics/overview:
    get:
      tags: [Analytics]
      summary: Get billing overview metrics
      operationId: getAnalyticsOverview
      responses:
        '200':
          description: Overview metrics (MRR, active customers, etc.)

  /v1/analytics/revenue:
    get:
      tags: [Analytics]
      summary: Get revenue chart data
      operationId: getRevenueChart
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, month]
            default: month
        - name: months
          in: query
          schema:
            type: integer
            default: 12
      responses:
        '200':
          description: Revenue time series

  # --- Health ---
  /health:
    get:
      tags: [System]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Service is alive

  /health/ready:
    get:
      tags: [System]
      summary: Readiness probe (checks database + scheduler)
      security: []
      responses:
        '200':
          description: Service is ready
        '503':
          description: Service is degraded

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API key for authentication. Three types:
        - `sk_live_*` / `sk_test_*` — Secret key (full access)
        - `pk_live_*` / `pk_test_*` — Publishable key (read-only)
        - `plat_*` — Platform key (tenant management)

  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource ID (e.g., vlx_cus_abc123)
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0

  schemas:
    Customer:
      type: object
      properties:
        id:
          type: string
          example: vlx_cus_a1b2c3d4e5f6
        external_id:
          type: string
        display_name:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    BillingProfile:
      type: object
      properties:
        customer_id:
          type: string
        legal_name:
          type: string
        email:
          type: string
        phone:
          type: string
        address_line1:
          type: string
        address_line2:
          type: string
        city:
          type: string
        state:
          type: string
        postal_code:
          type: string
        country:
          type: string
        currency:
          type: string
        tax_exempt:
          type: boolean
        tax_id:
          type: string
        tax_id_type:
          type: string
        profile_status:
          type: string
          enum: [missing, incomplete, ready]

    BillingProfileInput:
      type: object
      properties:
        legal_name:
          type: string
        email:
          type: string
        phone:
          type: string
        address_line1:
          type: string
        city:
          type: string
        state:
          type: string
        postal_code:
          type: string
        country:
          type: string
        currency:
          type: string
        tax_exempt:
          type: boolean

    Plan:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        description:
          type: string
        currency:
          type: string
        billing_interval:
          type: string
          enum: [monthly, yearly]
        status:
          type: string
          enum: [draft, active, archived]
        base_amount_cents:
          type: integer
          format: int64
        meter_ids:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    Meter:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
        name:
          type: string
        unit:
          type: string
        aggregation:
          type: string
          enum: [sum, max, last, count]
        rating_rule_version_id:
          type: string
        created_at:
          type: string
          format: date-time

    RatingTier:
      type: object
      properties:
        up_to:
          type: integer
          format: int64
          description: Upper bound (0 = unlimited)
        unit_amount_cents:
          type: integer
          format: int64

    Subscription:
      type: object
      properties:
        id:
          type: string
        customer_id:
          type: string
        plan_id:
          type: string
        status:
          type: string
          enum: [draft, active, paused, cancelled]
        trial_start_at:
          type: string
          format: date-time
        trial_end_at:
          type: string
          format: date-time
        current_billing_period_start:
          type: string
          format: date-time
        current_billing_period_end:
          type: string
          format: date-time
        next_billing_at:
          type: string
          format: date-time
        cancelled_at:
          type: string
          format: date-time
