openapi: 3.0.3
info:
  title: Velox Billing API
  description: |
    Usage-based billing engine with pricing, subscriptions, usage metering,
    invoice generation, Stripe payments, dunning, and customer credits.
  version: 1.0.0
  contact:
    name: Velox
    url: https://github.com/sagarsuperuser/velox

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.velox.dev
    description: Production

security:
  - ApiKeyAuth: []

tags:
  - name: Customers
    description: Customer lifecycle and billing profiles
  - name: Subscriptions
    description: Subscription management and lifecycle
  - name: Invoices
    description: Invoice generation, finalization, and payment
  - name: Pricing
    description: Plans, meters, and rating rules
  - name: Usage
    description: Usage event ingestion and aggregation
  - name: Credits
    description: Prepaid credit ledger operations
  - name: Credit Notes
    description: Refunds and credit notes on invoices
  - name: Coupons
    description: Discount coupon management and redemption
  - name: Dunning
    description: Payment failure recovery and retry
  - name: Webhooks
    description: Outbound webhook endpoint management
  - name: Audit
    description: Audit log queries
  - name: Settings
    description: Tenant configuration
  - name: Billing
    description: Billing engine operations
  - name: Analytics
    description: Revenue and usage analytics
  - name: API Keys
    description: API key lifecycle — issue, list, rotate, revoke

paths:
  # --- Customers ---
  /v1/customers:
    post:
      tags: [Customers]
      summary: Create a customer
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [external_id, display_name]
              properties:
                external_id:
                  type: string
                  example: cus_stripe_123
                display_name:
                  type: string
                  example: Acme Corp
                email:
                  type: string
                  format: email
                  example: billing@acme.com
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '409':
          description: Customer with this external_id already exists
        '422':
          description: Validation error
    get:
      tags: [Customers]
      summary: List customers
      operationId: listCustomers
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
      responses:
        '200':
          description: List of customers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Customer'
                  total:
                    type: integer

  /v1/customers/{id}:
    get:
      tags: [Customers]
      summary: Get a customer
      operationId: getCustomer
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Customer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          description: Customer not found
    patch:
      tags: [Customers]
      summary: Update a customer
      operationId: updateCustomer
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                email:
                  type: string
                status:
                  type: string
                  enum: [active, archived]
      responses:
        '200':
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'

  /v1/customers/{id}/billing-profile:
    put:
      tags: [Customers]
      summary: Create or update billing profile
      operationId: upsertBillingProfile
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingProfileInput'
      responses:
        '200':
          description: Billing profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingProfile'
    get:
      tags: [Customers]
      summary: Get billing profile
      operationId: getBillingProfile
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Billing profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingProfile'

  /v1/customers/{id}/export:
    get:
      tags: [Customers]
      summary: Export all customer data (GDPR)
      operationId: exportCustomerData
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Full data export
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: '#/components/schemas/Customer'
                  billing_profile:
                    $ref: '#/components/schemas/BillingProfile'
                  invoices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
                  subscriptions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subscription'

  /v1/customers/{id}/delete-data:
    post:
      tags: [Customers]
      summary: Anonymize and archive customer (GDPR)
      operationId: deleteCustomerData
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Customer anonymized
        '422':
          description: Customer has active subscriptions

  # --- Plans ---
  /v1/plans:
    post:
      tags: [Pricing]
      summary: Create a plan
      operationId: createPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name, currency, billing_interval]
              properties:
                code:
                  type: string
                  example: pro-monthly
                name:
                  type: string
                  example: Pro Monthly
                currency:
                  type: string
                  example: usd
                billing_interval:
                  type: string
                  enum: [monthly, yearly]
                base_amount_cents:
                  type: integer
                  format: int64
                  example: 9900
                meter_ids:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
    get:
      tags: [Pricing]
      summary: List plans
      operationId: listPlans
      responses:
        '200':
          description: List of plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Plan'

  /v1/plans/{id}:
    get:
      tags: [Pricing]
      summary: Get a plan
      operationId: getPlan
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Plan details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'

  # --- Meters ---
  /v1/meters:
    post:
      tags: [Pricing]
      summary: Create a meter
      operationId: createMeter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, name, unit, aggregation]
              properties:
                key:
                  type: string
                  example: api_calls
                name:
                  type: string
                  example: API Calls
                unit:
                  type: string
                  example: calls
                aggregation:
                  type: string
                  enum: [sum, max, last, count]
                rating_rule_version_id:
                  type: string
      responses:
        '201':
          description: Meter created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meter'
    get:
      tags: [Pricing]
      summary: List meters
      operationId: listMeters
      responses:
        '200':
          description: List of meters
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Meter'

  # --- Rating Rules ---
  /v1/rating-rules:
    post:
      tags: [Pricing]
      summary: Create a rating rule version
      operationId: createRatingRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rule_key, name, mode, currency]
              properties:
                rule_key:
                  type: string
                  example: api-calls-pricing
                name:
                  type: string
                mode:
                  type: string
                  enum: [flat, graduated, package]
                currency:
                  type: string
                flat_amount_cents:
                  type: integer
                  format: int64
                graduated_tiers:
                  type: array
                  items:
                    $ref: '#/components/schemas/RatingTier'
                package_size:
                  type: integer
                  format: int64
                package_amount_cents:
                  type: integer
                  format: int64
                overage_unit_amount_cents:
                  type: integer
                  format: int64
      responses:
        '201':
          description: Rating rule created
    get:
      tags: [Pricing]
      summary: List rating rules
      operationId: listRatingRules
      responses:
        '200':
          description: List of rating rule versions

  # --- Subscriptions ---
  /v1/subscriptions:
    post:
      tags: [Subscriptions]
      summary: Create a subscription
      operationId: createSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, display_name, customer_id, items]
              properties:
                code:
                  type: string
                display_name:
                  type: string
                customer_id:
                  type: string
                items:
                  type: array
                  minItems: 1
                  description: One or more priced items. Duplicate plan_id rejected per subscription.
                  items:
                    type: object
                    required: [plan_id]
                    properties:
                      plan_id:
                        type: string
                      quantity:
                        type: integer
                        format: int64
                        minimum: 1
                        default: 1
                start_now:
                  type: boolean
                  description: Activate immediately (skips draft state).
                billing_time:
                  type: string
                  enum: [anniversary, calendar]
                trial_days:
                  type: integer
                usage_cap_units:
                  type: integer
                  format: int64
                overage_action:
                  type: string
                  enum: [block, charge]
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
    get:
      tags: [Subscriptions]
      summary: List subscriptions
      operationId: listSubscriptions
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: customer_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, paused, cancelled]
      responses:
        '200':
          description: List of subscriptions

  /v1/subscriptions/{id}:
    get:
      tags: [Subscriptions]
      summary: Get a subscription
      operationId: getSubscription
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'

  /v1/subscriptions/{id}/activate:
    post:
      tags: [Subscriptions]
      summary: Activate a draft subscription
      operationId: activateSubscription
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Subscription activated

  /v1/subscriptions/{id}/cancel:
    post:
      tags: [Subscriptions]
      summary: Cancel a subscription
      operationId: cancelSubscription
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Subscription cancelled

  /v1/subscriptions/{id}/pause:
    post:
      tags: [Subscriptions]
      summary: Pause a subscription
      operationId: pauseSubscription
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Subscription paused

  /v1/subscriptions/{id}/resume:
    post:
      tags: [Subscriptions]
      summary: Resume a paused subscription
      operationId: resumeSubscription
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Subscription resumed

  /v1/subscriptions/{id}/items:
    post:
      tags: [Subscriptions]
      summary: Add an item to a subscription
      description: |
        Adds a new plan line to an active subscription. Mid-cycle adds are
        prorated against the remaining period as an invoice line. The backend
        rejects duplicates on (subscription_id, plan_id) with 409.
      operationId: addSubscriptionItem
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id]
              properties:
                plan_id:
                  type: string
                quantity:
                  type: integer
                  format: int64
                  minimum: 1
                  default: 1
      responses:
        '201':
          description: Item added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionItem'

  /v1/subscriptions/{id}/items/{itemID}:
    patch:
      tags: [Subscriptions]
      summary: Update a subscription item
      description: |
        Exactly one of `quantity` or `{new_plan_id, immediate}` must be
        provided — the two payload shapes are XOR. Quantity changes are
        applied immediately and prorated. Plan changes with `immediate=true`
        swap the plan now and prorate; with `immediate=false` they stamp
        `pending_plan_id` and apply at the next cycle boundary.
      operationId: updateSubscriptionItem
      parameters:
        - $ref: '#/components/parameters/ResourceID'
        - name: itemID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
                  format: int64
                  minimum: 1
                new_plan_id:
                  type: string
                immediate:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemChangeResult'
    delete:
      tags: [Subscriptions]
      summary: Remove a subscription item
      description: |
        Hard-deletes the item. Mid-cycle removes credit the customer for the
        unused portion of the just-paid period.
      operationId: removeSubscriptionItem
      parameters:
        - $ref: '#/components/parameters/ResourceID'
        - name: itemID
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Item removed

  /v1/subscriptions/{id}/items/{itemID}/pending-change:
    delete:
      tags: [Subscriptions]
      summary: Cancel a pending plan change on an item
      description: Idempotent. No-op if nothing was scheduled.
      operationId: cancelPendingItemChange
      parameters:
        - $ref: '#/components/parameters/ResourceID'
        - name: itemID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pending change cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionItem'

  # --- Usage Events ---
  /v1/usage-events:
    post:
      tags: [Usage]
      summary: Ingest a usage event
      operationId: ingestUsageEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, meter_id, quantity]
              properties:
                customer_id:
                  type: string
                meter_id:
                  type: string
                quantity:
                  type: integer
                  format: int64
                  example: 150
                timestamp:
                  type: string
                  format: date-time
                idempotency_key:
                  type: string
                properties:
                  type: object
      responses:
        '201':
          description: Event ingested
        '409':
          description: Duplicate idempotency key
    get:
      tags: [Usage]
      summary: List usage events
      operationId: listUsageEvents
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: customer_id
          in: query
          schema:
            type: string
        - name: meter_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of events

  /v1/usage-events/batch:
    post:
      tags: [Usage]
      summary: Ingest multiple usage events
      operationId: batchIngestUsageEvents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  maxItems: 1000
                  items:
                    type: object
                    required: [customer_id, meter_id, quantity]
                    properties:
                      customer_id:
                        type: string
                      meter_id:
                        type: string
                      quantity:
                        type: integer
                        format: int64
                      timestamp:
                        type: string
                        format: date-time
                      idempotency_key:
                        type: string
      responses:
        '200':
          description: Batch result
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
                  rejected:
                    type: integer

  # --- Invoices ---
  /v1/invoices:
    get:
      tags: [Invoices]
      summary: List invoices
      operationId: listInvoices
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: customer_id
          in: query
          schema:
            type: string
        - name: subscription_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, finalized, paid, voided]
        - name: payment_status
          in: query
          schema:
            type: string
            enum: [pending, processing, succeeded, failed]
      responses:
        '200':
          description: List of invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
                  total:
                    type: integer

  /v1/invoices/{id}:
    get:
      tags: [Invoices]
      summary: Get an invoice with line items
      operationId: getInvoice
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Invoice with line items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Invoice'
                  - type: object
                    properties:
                      line_items:
                        type: array
                        items:
                          $ref: '#/components/schemas/InvoiceLineItem'

  /v1/invoices/{id}/finalize:
    post:
      tags: [Invoices]
      summary: Finalize a draft invoice
      description: |
        Transitions the invoice from draft to finalized, issues the
        invoice number, fires invoice.finalized, and attempts auto-charge
        if the customer has a payment method on file. Emails the invoice
        PDF to the customer asynchronously.
      operationId: finalizeInvoice
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Invoice finalized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'

  /v1/invoices/{id}/void:
    post:
      tags: [Invoices]
      summary: Void an invoice
      operationId: voidInvoice
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Invoice voided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'

  /v1/invoices/{id}/line-items:
    post:
      tags: [Invoices]
      summary: Add a manual line item to a draft invoice
      operationId: addInvoiceLineItem
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [description, quantity, unit_amount_cents]
              properties:
                description:
                  type: string
                line_type:
                  type: string
                  description: Defaults to "manual" if omitted.
                quantity:
                  type: integer
                  format: int64
                  minimum: 1
                unit_amount_cents:
                  type: integer
                  format: int64
                  minimum: 1
      responses:
        '201':
          description: Line item added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceLineItem'

  /v1/invoices/{id}/send:
    post:
      tags: [Invoices]
      summary: Email the invoice PDF to a specific address
      operationId: sendInvoice
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email dispatched

  /v1/invoices/{id}/collect:
    post:
      tags: [Invoices]
      summary: Attempt immediate payment collection for a finalized invoice
      description: |
        Creates a PaymentIntent against the customer's stored payment
        method. Only valid on finalized, unpaid invoices with amount_due > 0.
      operationId: collectInvoicePayment
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Payment initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'

  /v1/invoices/{id}/refund:
    post:
      tags: [Invoices]
      summary: Issue a refund via credit note
      description: |
        Issues a refund through Stripe and records the corresponding
        credit note. amount_cents=0 refunds the full remaining
        refundable balance.
      operationId: refundInvoice
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                amount_cents:
                  type: integer
                  format: int64
                  minimum: 0
                reason:
                  type: string
                  enum: [duplicate, fraudulent, requested_by_customer, other]
                description:
                  type: string
      responses:
        '200':
          description: Refund issued, credit note returned

  /v1/invoices/{id}/payment-timeline:
    get:
      tags: [Invoices]
      summary: Get operator-facing payment + dunning event timeline
      operationId: getInvoicePaymentTimeline
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Chronological list of payment and dunning events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        timestamp:
                          type: string
                          format: date-time
                        source:
                          type: string
                          enum: [stripe, dunning]
                        event_type:
                          type: string
                        status:
                          type: string
                        description:
                          type: string
                        error:
                          type: string
                        amount_cents:
                          type: integer
                          format: int64
                        currency:
                          type: string
                        payment_intent_id:
                          type: string
                        attempt_count:
                          type: integer

  /v1/invoices/{id}/pdf:
    get:
      tags: [Invoices]
      summary: Download invoice PDF
      operationId: getInvoicePDF
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  # --- Credits ---
  /v1/credits/grant:
    post:
      tags: [Credits]
      summary: Grant credits to a customer
      operationId: grantCredits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, amount_cents]
              properties:
                customer_id:
                  type: string
                amount_cents:
                  type: integer
                  format: int64
                  example: 5000
                description:
                  type: string
                  example: Welcome bonus
                expires_at:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Credits granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditLedgerEntry'

  /v1/credits/balance/{customer_id}:
    get:
      tags: [Credits]
      summary: Get credit balance for a customer
      operationId: getCreditBalance
      parameters:
        - name: customer_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Credit balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditBalance'

  /v1/credits/ledger/{customer_id}:
    get:
      tags: [Credits]
      summary: List credit ledger entries
      operationId: listCreditLedger
      parameters:
        - name: customer_id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Credit ledger entries

  # --- Coupons ---
  /v1/coupons:
    post:
      tags: [Coupons]
      summary: Create a coupon
      operationId: createCoupon
      description: |
        Percentages are carried in basis points (5050 = 50.50%); the legacy
        float `percent_off` is no longer accepted. Supply either `amount_off`
        + `currency` (fixed-amount coupon) or `percent_off_bp` (percentage).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CouponCreateRequest'
      responses:
        '201':
          description: Coupon created
          headers:
            ETag:
              schema: { type: string }
              description: Strong ETag wrapping the version integer. Echo as `If-Match` on subsequent updates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '409':
          description: Code already taken
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
        '422':
          description: Validation failed (unknown plan, currency mismatch, discount is zero, …)
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    get:
      tags: [Coupons]
      summary: List coupons
      operationId: listCoupons
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
          description: Opaque pagination cursor returned as `next_cursor` on the previous page.
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: include_archived
          schema: { type: boolean, default: false }
          description: Surface archived rows. Default is the live set only.
        - in: query
          name: type
          schema: { type: string, enum: [percentage, fixed_amount] }
        - in: query
          name: duration
          schema: { type: string, enum: [once, repeating, forever] }
        - in: query
          name: expires_before
          schema: { type: string, format: date-time }
          description: Only return coupons expiring before the given RFC3339 timestamp.
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Coupon' }
                  has_more: { type: boolean }
                  next_cursor: { type: string, nullable: true }

  /v1/coupons/{id}:
    parameters:
      - $ref: '#/components/parameters/ResourceID'
    get:
      tags: [Coupons]
      summary: Get a coupon
      operationId: getCoupon
      responses:
        '200':
          description: Coupon
          headers:
            ETag:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Coupon' }
        '404':
          description: Not found
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    patch:
      tags: [Coupons]
      summary: Update a coupon
      operationId: updateCoupon
      description: |
        Only the fields explicitly present in the request body change. Send
        a field as `null` to clear it (e.g. `"expires_at": null` removes the
        expiry). Pass the ETag you last read in `If-Match` to guard against
        concurrent edits — a mismatch returns 412 and you should re-GET
        before retrying.
      parameters:
        - in: header
          name: If-Match
          schema: { type: string }
          description: Quoted version integer (e.g. `"3"`). Optional; recommended for any write after a read.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CouponUpdateRequest' }
      responses:
        '200':
          description: Coupon updated
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Coupon' }
        '412':
          description: If-Match version mismatch (coupon was modified by another writer)
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /v1/coupons/{id}/archive:
    post:
      tags: [Coupons]
      summary: Archive a coupon
      operationId: archiveCoupon
      description: |
        Archived coupons cannot be redeemed by new customers, but existing
        redemptions continue to apply until they exhaust their duration — so
        ongoing contracts aren't broken retroactively. Reversible via
        `/unarchive`.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200': { description: Coupon archived }

  /v1/coupons/{id}/unarchive:
    post:
      tags: [Coupons]
      summary: Unarchive a coupon
      operationId: unarchiveCoupon
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200': { description: Coupon unarchived }

  /v1/coupons/preview:
    post:
      tags: [Coupons]
      summary: Preview a coupon's discount
      operationId: previewCoupon
      description: |
        Exercises every redeem gate except the atomic-persist step and
        returns the discount that *would* apply. Useful for cart/checkout
        flows that want to show the shortfall on a min-amount miss or the
        discount before the user commits. Does not increment `times_redeemed`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CouponRedeemRequest' }
      responses:
        '200':
          description: Preview result
          content:
            application/json:
              schema:
                type: object
                properties:
                  discount_cents: { type: integer, format: int64 }
                  coupon: { $ref: '#/components/schemas/Coupon' }
        '422':
          description: Coupon failed a gate — see the domain `code` (coupon_expired, coupon_min_amount_not_met, …)
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /v1/coupons/redeem:
    post:
      tags: [Coupons]
      summary: Redeem a coupon
      operationId: redeemCoupon
      description: |
        Commits a redemption. Supply `Idempotency-Key` (header or body) so a
        retried POST returns the original redemption row instead of creating
        a duplicate; an idempotent replay returns 200 with the
        `Idempotent-Replay: true` response header, a fresh commit returns 201.
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string }
          description: Client-supplied retry token. Same key + same body → same row.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CouponRedeemRequest' }
      responses:
        '201':
          description: New redemption committed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CouponRedemption' }
        '200':
          description: Idempotent replay of an earlier redemption
          headers:
            Idempotent-Replay:
              schema: { type: string, enum: ['true'] }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CouponRedemption' }
        '422':
          description: Coupon failed a gate (see domain `code`)
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /v1/coupons/{id}/redemptions:
    get:
      tags: [Coupons]
      summary: List redemptions for a coupon
      operationId: listCouponRedemptions
      parameters:
        - $ref: '#/components/parameters/ResourceID'
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Paginated list of redemptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/CouponRedemption' }
                  has_more: { type: boolean }
                  next_cursor: { type: string, nullable: true }

  # --- Credit Notes ---
  /v1/credit-notes:
    post:
      tags: [Credit Notes]
      summary: Create a credit note on an invoice
      operationId: createCreditNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoice_id, reason]
              properties:
                invoice_id:
                  type: string
                reason:
                  type: string
                line_items:
                  type: array
                  items:
                    type: object
                    properties:
                      description:
                        type: string
                      amount_cents:
                        type: integer
                        format: int64
      responses:
        '201':
          description: Credit note created

  # --- Dunning ---
  /v1/dunning/policy:
    get:
      tags: [Dunning]
      summary: Get dunning policy
      operationId: getDunningPolicy
      responses:
        '200':
          description: Dunning policy
    put:
      tags: [Dunning]
      summary: Update dunning policy
      operationId: updateDunningPolicy
      responses:
        '200':
          description: Policy updated

  /v1/dunning/runs:
    get:
      tags: [Dunning]
      summary: List active dunning runs
      operationId: listDunningRuns
      responses:
        '200':
          description: List of dunning runs

  # --- Webhook Endpoints ---
  /v1/webhook-endpoints:
    post:
      tags: [Webhooks]
      summary: Create a webhook endpoint
      operationId: createWebhookEndpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                  example: https://example.com/webhooks
                description:
                  type: string
                events:
                  type: array
                  items:
                    type: string
                  example: ["invoice.created", "payment.succeeded"]
      responses:
        '201':
          description: Endpoint created (signing secret returned once)
    get:
      tags: [Webhooks]
      summary: List webhook endpoints
      operationId: listWebhookEndpoints
      responses:
        '200':
          description: List of endpoints

  # --- Audit ---
  /v1/audit-log:
    get:
      tags: [Audit]
      summary: Query audit log
      operationId: queryAuditLog
      parameters:
        - name: resource_type
          in: query
          schema:
            type: string
        - name: resource_id
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Audit entries

  # --- Settings ---
  /v1/settings:
    get:
      tags: [Settings]
      summary: Get tenant settings
      operationId: getSettings
      responses:
        '200':
          description: Tenant settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSettings'
    put:
      tags: [Settings]
      summary: Update tenant settings
      operationId: updateSettings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantSettings'
      responses:
        '200':
          description: Updated settings

  # --- Billing ---
  /v1/billing/run:
    post:
      tags: [Billing]
      summary: Manually trigger a billing cycle
      operationId: triggerBillingCycle
      responses:
        '200':
          description: Billing cycle result
          content:
            application/json:
              schema:
                type: object
                properties:
                  generated:
                    type: integer
                  errors:
                    type: integer

  /v1/billing/preview/{subscription_id}:
    get:
      tags: [Billing]
      summary: Preview the next invoice for a subscription
      operationId: previewInvoice
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice preview

  # --- Analytics ---
  /v1/analytics/overview:
    get:
      tags: [Analytics]
      summary: Get billing overview metrics
      operationId: getAnalyticsOverview
      responses:
        '200':
          description: Overview metrics (MRR, active customers, etc.)

  /v1/analytics/revenue:
    get:
      tags: [Analytics]
      summary: Get revenue chart data
      operationId: getRevenueChart
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, month]
            default: month
        - name: months
          in: query
          schema:
            type: integer
            default: 12
      responses:
        '200':
          description: Revenue time series

  # --- Health ---
  /health:
    get:
      tags: [System]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Service is alive

  /health/ready:
    get:
      tags: [System]
      summary: Readiness probe (checks database + scheduler)
      security: []
      responses:
        '200':
          description: Service is ready
        '503':
          description: Service is degraded

  # --- API Keys ---
  /v1/api-keys:
    get:
      tags: [API Keys]
      summary: List API keys for the current tenant
      responses:
        '200':
          description: Keys listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/APIKey'
    post:
      tags: [API Keys]
      summary: Create a new API key (raw key shown once)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAPIKeyInput'
      responses:
        '201':
          description: Key created — raw_key is shown once
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAPIKeyResult'

  /v1/api-keys/{id}:
    delete:
      tags: [API Keys]
      summary: Revoke an API key
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Key revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKey'
        '404':
          description: Key not found
        '422':
          description: Cannot revoke the key being used to authenticate this request

  /v1/api-keys/{id}/rotate:
    post:
      tags: [API Keys]
      summary: Rotate an API key (issue replacement, retire old)
      description: |
        Mints a replacement key with the same type, name, livemode, and
        expires_at as the old one. Returns the new key's raw secret — shown
        once, never retrievable later.

        The old key is retired based on `expires_in_seconds`:

        - `0` (default) → revoked immediately. The next call using the old
          key returns 401.
        - `> 0` → the old key's `expires_at` is set to `now + N seconds` and
          remains valid until then. Use this for zero-downtime rotation:
          deploy the new key, let traffic drain, then let the old key lapse.

        The grace window is capped at 7 days (`604800` seconds).

        Self-rotation (rotating the key that authenticated the request) is
        rejected with 422 — authenticate with a different key first. This
        prevents locking yourself out during an interactive rotation.
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateAPIKeyInput'
      responses:
        '200':
          description: Key rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RotateAPIKeyResult'
        '404':
          description: Key not found
        '422':
          description: Invalid grace period, key already revoked, or self-rotation attempt

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API key for authentication. Three types:
        - `sk_live_*` / `sk_test_*` — Secret key (full access)
        - `pk_live_*` / `pk_test_*` — Publishable key (read-only)
        - `plat_*` — Platform key (tenant management)

  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource ID (e.g., vlx_cus_abc123)
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0

  schemas:
    APIKey:
      type: object
      properties:
        id:
          type: string
          example: vlx_key_cv2q6ktjml6ng3v2q0tg
        key_prefix:
          type: string
          description: |
            Lookup prefix (mode-aware + first 12 hex chars of the secret).
            Stored in the clear so a leaked key can be correlated with a
            specific row without revealing the full secret.
          example: vlx_secret_live_1a2b3c4d5e6f
        key_type:
          type: string
          enum: [platform, secret, publishable]
        livemode:
          type: boolean
        name:
          type: string
          description: Human-readable label shown in the dashboard.
        tenant_id:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true

    CreateAPIKeyInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Production web backend
        key_type:
          type: string
          enum: [platform, secret, publishable]
          default: secret
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional absolute expiry for the key.

    CreateAPIKeyResult:
      type: object
      properties:
        key:
          $ref: '#/components/schemas/APIKey'
        raw_key:
          type: string
          description: |
            Full raw key (shown exactly once). Save it now — the server does
            not store the secret, only a salted hash. Subsequent GETs on the
            key return the metadata but not this value.
          example: vlx_secret_live_d1e2f3a4b5c6...

    RotateAPIKeyInput:
      type: object
      properties:
        expires_in_seconds:
          type: integer
          format: int64
          minimum: 0
          maximum: 604800
          default: 0
          description: |
            Seconds the old key stays valid after rotation (grace window).
            `0` (default) revokes the old key immediately. Capped at
            `604800` (7 days). Set this when you need time to deploy the
            new key across fleet instances before old credentials stop
            working.

    RotateAPIKeyResult:
      type: object
      properties:
        old_key:
          allOf:
            - $ref: '#/components/schemas/APIKey'
          description: |
            The retired key's post-rotation state. `revoked_at` is set for
            immediate rotations; `expires_at` is set for grace-period
            rotations. Both are terminal — the key is not coming back.
        new_key:
          $ref: '#/components/schemas/APIKey'
        raw_key:
          type: string
          description: |
            The new key's raw secret (shown exactly once). Deploy this to
            your clients before the grace window closes.

    Customer:
      type: object
      properties:
        id:
          type: string
          example: vlx_cus_a1b2c3d4e5f6
        external_id:
          type: string
        display_name:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    BillingProfile:
      type: object
      properties:
        customer_id:
          type: string
        legal_name:
          type: string
        email:
          type: string
        phone:
          type: string
        address_line1:
          type: string
        address_line2:
          type: string
        city:
          type: string
        state:
          type: string
        postal_code:
          type: string
        country:
          type: string
        currency:
          type: string
        tax_exempt:
          type: boolean
        tax_id:
          type: string
        tax_id_type:
          type: string
        profile_status:
          type: string
          enum: [missing, incomplete, ready]

    BillingProfileInput:
      type: object
      properties:
        legal_name:
          type: string
        email:
          type: string
        phone:
          type: string
        address_line1:
          type: string
        city:
          type: string
        state:
          type: string
        postal_code:
          type: string
        country:
          type: string
        currency:
          type: string
        tax_exempt:
          type: boolean

    Plan:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        description:
          type: string
        currency:
          type: string
        billing_interval:
          type: string
          enum: [monthly, yearly]
        status:
          type: string
          enum: [draft, active, archived]
        base_amount_cents:
          type: integer
          format: int64
        meter_ids:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    Meter:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
        name:
          type: string
        unit:
          type: string
        aggregation:
          type: string
          enum: [sum, max, last, count]
        rating_rule_version_id:
          type: string
        created_at:
          type: string
          format: date-time

    RatingTier:
      type: object
      properties:
        up_to:
          type: integer
          format: int64
          description: Upper bound (0 = unlimited)
        unit_amount_cents:
          type: integer
          format: int64

    Subscription:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        display_name:
          type: string
        customer_id:
          type: string
        items:
          type: array
          description: |
            Priced lines on the subscription. Each item has its own plan and
            quantity; billing emits one invoice line per item × quantity.
          items:
            $ref: '#/components/schemas/SubscriptionItem'
        status:
          type: string
          enum: [draft, active, paused, cancelled, trialing]
        billing_time:
          type: string
          enum: [anniversary, calendar]
        trial_start_at:
          type: string
          format: date-time
        trial_end_at:
          type: string
          format: date-time
        current_billing_period_start:
          type: string
          format: date-time
        current_billing_period_end:
          type: string
          format: date-time
        next_billing_at:
          type: string
          format: date-time
        usage_cap_units:
          type: integer
          format: int64
          nullable: true
        overage_action:
          type: string
          enum: [block, charge]
        cancelled_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    SubscriptionItem:
      type: object
      properties:
        id:
          type: string
        subscription_id:
          type: string
        plan_id:
          type: string
        quantity:
          type: integer
          format: int64
          minimum: 1
        pending_plan_id:
          type: string
          description: Set when a deferred plan change is scheduled on this item.
        pending_plan_effective_at:
          type: string
          format: date-time
          description: When the pending plan change applies (typically next cycle boundary).
        plan_changed_at:
          type: string
          format: date-time
          description: Timestamp of the last immediate plan swap on this item.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ItemChangeResult:
      type: object
      description: Returned by `PATCH /subscriptions/{id}/items/{itemID}`.
      properties:
        item:
          $ref: '#/components/schemas/SubscriptionItem'
        effective_at:
          type: string
          format: date-time
          description: When the change is applied (now for immediate, future for scheduled).
        proration:
          type: object
          nullable: true
          description: Populated when the change drove a proration invoice or credit.
          properties:
            old_plan_id:
              type: string
            new_plan_id:
              type: string
            proration_factor:
              type: number
              format: double
              description: Share of the current period remaining, in [0, 1].
            amount_cents:
              type: integer
              format: int64
              description: Positive = additional charge; negative = credit.
            type:
              type: string
              enum: [invoice, credit]
            invoice_id:
              type: string

    Invoice:
      type: object
      properties:
        id:
          type: string
        customer_id:
          type: string
        subscription_id:
          type: string
        invoice_number:
          type: string
        status:
          type: string
          enum: [draft, finalized, paid, voided]
        payment_status:
          type: string
          enum: [pending, processing, succeeded, failed]
        currency:
          type: string
        subtotal_cents:
          type: integer
          format: int64
        tax_amount_cents:
          type: integer
          format: int64
        tax_rate_bp:
          type: integer
          description: Tax rate in basis points (1850 = 18.50%)
        total_amount_cents:
          type: integer
          format: int64
        amount_due_cents:
          type: integer
          format: int64
        credits_applied_cents:
          type: integer
          format: int64
        billing_period_start:
          type: string
          format: date-time
        billing_period_end:
          type: string
          format: date-time
        due_at:
          type: string
          format: date-time
        paid_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    InvoiceLineItem:
      type: object
      properties:
        id:
          type: string
        invoice_id:
          type: string
        line_type:
          type: string
          enum: [base_fee, usage, add_on, discount, tax]
        description:
          type: string
        quantity:
          type: integer
          format: int64
        unit_amount_cents:
          type: integer
          format: int64
        amount_cents:
          type: integer
          format: int64
        tax_amount_cents:
          type: integer
          format: int64
        total_amount_cents:
          type: integer
          format: int64

    CreditLedgerEntry:
      type: object
      properties:
        id:
          type: string
        customer_id:
          type: string
        entry_type:
          type: string
          enum: [grant, usage, expiry, adjustment]
        amount_cents:
          type: integer
          format: int64
        description:
          type: string
        invoice_id:
          type: string
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    CreditBalance:
      type: object
      properties:
        customer_id:
          type: string
        balance_cents:
          type: integer
          format: int64

    Coupon:
      type: object
      properties:
        id: { type: string }
        code:
          type: string
          description: Customer-facing, case-preserving identifier (e.g. `WELCOME20`). Unique per tenant.
        name: { type: string }
        type:
          type: string
          enum: [percentage, fixed_amount]
        amount_off:
          type: integer
          format: int64
          description: Cents off (fixed-amount coupons). Zero for percentage coupons.
        percent_off_bp:
          type: integer
          description: Percentage discount in basis points. `5050` means 50.50%.
        currency:
          type: string
          description: ISO-4217 currency for fixed-amount coupons. Empty for percentage.
        max_redemptions:
          type: integer
          nullable: true
          description: Global redemption cap. Null means unlimited.
        times_redeemed:
          type: integer
          description: Count of successful non-voided redemptions.
        expires_at:
          type: string
          format: date-time
          nullable: true
        plan_ids:
          type: array
          items: { type: string }
          description: If non-empty, the coupon is redeemable only against these plans.
        duration:
          type: string
          enum: [once, repeating, forever]
          description: |
            How the discount applies across billing cycles.
              * `once` — one invoice only.
              * `repeating` — the next `duration_periods` invoices.
              * `forever` — every invoice while the coupon is attached.
        duration_periods:
          type: integer
          nullable: true
          description: Required for `repeating`; ignored otherwise.
        stackable:
          type: boolean
          description: |
            When true, combines with other stackable coupons on the same invoice:
            percentages sum (capped at 100%), amounts sum. When false, only the
            best single coupon applies.
        customer_id:
          type: string
          description: Non-empty marks the coupon as private — only this customer can redeem.
        restrictions:
          $ref: '#/components/schemas/CouponRestrictions'
        metadata:
          type: object
          additionalProperties: true
        archived_at:
          type: string
          format: date-time
          nullable: true
        version:
          type: integer
          description: Optimistic-concurrency token. Echoed in the `ETag` response header; send via `If-Match` on update.
        created_at:
          type: string
          format: date-time

    CouponRestrictions:
      type: object
      properties:
        min_amount_cents:
          type: integer
          format: int64
          description: Smallest pre-discount subtotal the coupon applies to (e.g. "$10 off orders of $50+").
        first_time_customer_only:
          type: boolean
          description: Blocks redemption for any customer who already has a prior invoice.
        max_redemptions_per_customer:
          type: integer
          description: Per-customer cap. Zero means no per-customer limit.

    CouponCreateRequest:
      type: object
      required: [code, name, type]
      properties:
        code: { type: string, example: WELCOME20 }
        name: { type: string }
        type: { type: string, enum: [percentage, fixed_amount] }
        amount_off: { type: integer, format: int64 }
        percent_off_bp: { type: integer, example: 2000, description: '2000 = 20%' }
        currency: { type: string }
        max_redemptions: { type: integer, nullable: true }
        expires_at: { type: string, format: date-time }
        plan_ids:
          type: array
          items: { type: string }
        duration: { type: string, enum: [once, repeating, forever] }
        duration_periods: { type: integer }
        stackable: { type: boolean }
        customer_id: { type: string }
        restrictions: { $ref: '#/components/schemas/CouponRestrictions' }
        metadata:
          type: object
          additionalProperties: true

    CouponUpdateRequest:
      type: object
      description: |
        Explicit-presence PATCH: only the fields you send are modified.
        Sending `expires_at: null` clears the expiry; omitting it leaves it alone.
      properties:
        name: { type: string }
        max_redemptions: { type: integer, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        restrictions: { $ref: '#/components/schemas/CouponRestrictions' }
        metadata:
          type: object
          additionalProperties: true

    CouponRedeemRequest:
      type: object
      required: [code, customer_id, subtotal_cents]
      properties:
        code: { type: string }
        customer_id: { type: string }
        subscription_id: { type: string }
        invoice_id: { type: string }
        plan_id: { type: string, description: 'Required when the coupon is plan-gated.' }
        currency: { type: string, description: 'Required for fixed-amount coupons — must match the coupon.' }
        subtotal_cents: { type: integer, format: int64 }
        idempotency_key:
          type: string
          description: Optional — header `Idempotency-Key` takes precedence when both are supplied.

    CouponRedemption:
      type: object
      properties:
        id: { type: string }
        coupon_id: { type: string }
        customer_id: { type: string }
        subscription_id: { type: string }
        invoice_id: { type: string }
        discount_cents:
          type: integer
          format: int64
        periods_applied:
          type: integer
          description: Count of billing cycles this redemption has discounted so far. Relevant for `repeating` / `forever`.
        idempotency_key: { type: string }
        voided_at:
          type: string
          format: date-time
          nullable: true
          description: Set when the underlying invoice is fully credited or refunded; a voided redemption no longer counts toward `times_redeemed`.
        created_at:
          type: string
          format: date-time

    TenantSettings:
      type: object
      properties:
        default_currency:
          type: string
          example: USD
        timezone:
          type: string
          example: UTC
        invoice_prefix:
          type: string
          example: VLX
        net_payment_terms:
          type: integer
          example: 30
        tax_rate_bp:
          type: integer
          description: Default tax rate in basis points
          example: 1850
        tax_home_country:
          type: string
          description: ISO-3166 alpha-2 tax jurisdiction; seeds from company_country on first save
          example: US
        company_name:
          type: string
        company_address_line1:
          type: string
        company_address_line2:
          type: string
        company_city:
          type: string
        company_state:
          type: string
        company_postal_code:
          type: string
        company_country:
          type: string
          description: ISO-3166 alpha-2 registered-business country
          example: US
        company_email:
          type: string
        company_phone:
          type: string
        logo_url:
          type: string

    Error:
      type: object
      properties:
        error:
          type: string
        request_id:
          type: string
