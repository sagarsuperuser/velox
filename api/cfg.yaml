# oapi-codegen configuration for the Velox HTTP API.
#
# Drives `make gen-go` (Makefile target) to emit chi-server scaffolding
# from api/openapi.yaml. The generated output is checked in alongside
# this file so a CI step (`make gen && git diff --exit-code`) can fail
# the build on drift between the spec and the regenerated artifacts.
#
# - package: ends up as the Go package of the generated file
#   (internal/api/generated). Lives under internal/ so external
#   consumers don't import it — this is implementation detail of the
#   spec → handler glue, not a public surface.
# - generate.models: emits typed request/response structs (DTO layer).
# - generate.chi-server: emits the chi-flavoured server interface +
#   route registration helpers. We implement the interface from the
#   existing internal/<domain>/handler.go files; no full handler
#   generation, no second copy of business logic.
# - output-options.skip-prune: keep components that aren't transitively
#   reachable from any path, so we can pre-stage schemas (e.g. while
#   migrating endpoints one at a time) without losing them.
package: generated
generate:
  models: true
  chi-server: true
output: internal/api/generated/api.gen.go
output-options:
  # Keep schemas that aren't transitively reachable from any path so we
  # can pre-stage components while migrating endpoints one at a time.
  skip-prune: true
  # Match the existing hand-written domain structs: optional fields use
  # plain Go types (string/int64/bool) with `omitempty`, not *T pointers.
  # Without this, oapi-codegen emits *string for every nullable string
  # and the wire shape diverges from domain.Invoice (a *"" non-nil
  # pointer would marshal as `""` while the domain type omits the key
  # entirely). Equivalent to adding x-go-type-skip-optional-pointer:
  # true on every property — set globally so we don't have to annotate
  # each field.
  prefer-skip-optional-pointer: true
  # Containers (slices/maps) are nil-or-populated already; the optional
  # pointer wrapping is purely noise on them.
  prefer-skip-optional-pointer-on-container-types: true
