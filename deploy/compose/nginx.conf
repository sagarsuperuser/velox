# Velox reverse proxy — single upstream, terminates HTTP at :80
#
# For HTTPS termination, run certbot or put a managed load balancer
# (ALB / Cloudflare) in front. This config is HTTP-only on purpose so
# the local quickstart works with `curl http://localhost/health` and
# operators add TLS the way that fits their infra.

upstream velox_api {
    server velox-api:8080;
    keepalive 32;
}

upstream velox_dashboard {
    server velox-dashboard:80;
    keepalive 8;
}

server {
    listen 80 default_server;
    server_name _;

    # Cap bodies — webhook payloads are small. Bump if you accept large
    # CSV imports through a future endpoint.
    client_max_body_size 1m;

    # Proxy timeouts — match the binary's WriteTimeout (30s) plus headroom.
    proxy_connect_timeout 5s;
    proxy_send_timeout 35s;
    proxy_read_timeout 35s;

    # Restrict /metrics to localhost + private RFC1918 ranges by default.
    # Operators routing Prometheus from outside should add their CIDR here
    # or use METRICS_TOKEN bearer auth (see .env.example).
    location = /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://velox_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE stream: buffering must be OFF and the read timeout long, or the
    # proxy holds/kills the event stream (the general 35s read timeout
    # above would sever it).
    location = /v1/webhook_events/stream {
        proxy_pass http://velox_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # API surfaces → the Go binary. Everything else is the SPA, so the
    # dashboard and the API share ONE origin (no CORS, no build-time
    # VITE_API_URL — the app falls back to window.location.origin).
    location ~ ^/(v1/|health|docs) {
        proxy_pass http://velox_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dashboard SPA (velox-dashboard container; SPA fallback handled by
    # its internal nginx).
    location / {
        proxy_pass http://velox_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
