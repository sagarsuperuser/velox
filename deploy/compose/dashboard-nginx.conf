# Dashboard container's INTERNAL nginx — serves the built SPA only. The
# compose front proxy (nginx.conf) routes / here and /v1 + friends to the
# API, so the browser sees one origin.
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Hashed build assets are immutable; index.html must revalidate so a
    # redeploy is picked up on refresh.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache";
        # SPA fallback: client-side routes (e.g. /invoices/vlx_inv_…)
        # resolve to index.html.
        try_files $uri $uri/ /index.html;
    }
}
