apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: velox
  namespace: velox
  labels:
    app.kubernetes.io/name: velox
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: velox
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
