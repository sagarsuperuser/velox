# External Secrets Operator (ESO) configuration for Velox.
#
# This is the industry-standard pattern for secrets management in Kubernetes:
#   Vault/AWS SM → External Secrets Operator → K8s Secret → env var → app reads os.Getenv()
#
# Prerequisites:
#   1. Install ESO: helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#   2. Configure a SecretStore (Vault or AWS — see examples below)
#   3. Apply the ExternalSecret resources below
#
# The app never knows where secrets come from. It just reads env vars.

---
# ============================================================================
# Option A: AWS Secrets Manager
# ============================================================================

# Step 1: SecretStore pointing to AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: velox
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # Uses IAM role attached to the EKS node/pod (recommended)
      # For explicit credentials, use a K8s secret reference:
      # auth:
      #   secretRef:
      #     accessKeyIDSecretRef: { name: aws-creds, key: access-key }
      #     secretAccessKeySecretRef: { name: aws-creds, key: secret-key }

---
# Step 2: ExternalSecret that syncs AWS SM → K8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: velox-secrets
  namespace: velox
spec:
  refreshInterval: 5m  # Check for rotation every 5 minutes
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: velox-secrets           # K8s Secret name (referenced by Deployment)
    creationPolicy: Owner         # ESO owns the K8s Secret lifecycle
  data:
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: velox/stripe-secret-key

    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: velox/stripe-webhook-secret

    - secretKey: VELOX_ENCRYPTION_KEY
      remoteRef:
        key: velox/encryption-key

    - secretKey: VELOX_BOOTSTRAP_TOKEN
      remoteRef:
        key: velox/bootstrap-token

    - secretKey: DATABASE_URL
      remoteRef:
        key: velox/database-url

    - secretKey: REDIS_URL
      remoteRef:
        key: velox/redis-url

---
