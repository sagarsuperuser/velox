groups:
  # -----------------------------------------------------------------------
  # Billing Engine Health
  # -----------------------------------------------------------------------
  - name: velox-billing
    rules:
      - alert: BillingCycleFailures
        expr: rate(velox_billing_cycle_errors_total[15m]) > 0
        for: 5m
        labels:
          severity: critical
          team: billing
        annotations:
          summary: "Billing cycle producing errors"
          description: "{{ $value | humanize }} billing errors/sec over last 15 minutes. Invoices may not be generated."
          runbook: "Check scheduler logs: kubectl logs -l app=velox --tail=100 | grep 'billing cycle error'"

      - alert: BillingCycleStalled
        expr: time() - velox_billing_cycles_total > 7200
        for: 10m
        labels:
          severity: warning
          team: billing
        annotations:
          summary: "No billing cycle completed in 2+ hours"
          description: "The billing scheduler may have stalled. Check if the process is running."

      - alert: BillingCycleSlow
        expr: histogram_quantile(0.95, rate(velox_billing_cycle_duration_seconds_bucket[1h])) > 300
        for: 15m
        labels:
          severity: warning
          team: billing
        annotations:
          summary: "Billing cycle p95 latency exceeds 5 minutes"
          description: "p95 billing cycle duration is {{ $value | humanize }}s. May need to increase batch size or add instances."

  # -----------------------------------------------------------------------
  # Payment Processing
  # -----------------------------------------------------------------------
  - name: velox-payments
    rules:
      - alert: PaymentFailureRateHigh
        expr: |
          rate(velox_payment_charges_total{result="failed"}[30m])
          / (rate(velox_payment_charges_total{result="succeeded"}[30m]) + rate(velox_payment_charges_total{result="failed"}[30m]))
          > 0.2
        for: 10m
        labels:
          severity: critical
          team: billing
        annotations:
          summary: "Payment failure rate exceeds 20%"
          description: "{{ $value | humanizePercentage }} of payment attempts are failing. Check Stripe dashboard and dunning logs."

      - alert: AutoChargeRetriesFailing
        expr: rate(velox_auto_charge_retries_total{result="failed"}[1h]) > 0.5
        for: 15m
        labels:
          severity: warning
          team: billing
        annotations:
          summary: "Auto-charge retries consistently failing"
          description: "{{ $value | humanize }} auto-charge retry failures/sec. Customers may have invalid payment methods."

  # -----------------------------------------------------------------------
  # Webhook Delivery
  # -----------------------------------------------------------------------
  - name: velox-webhooks
    rules:
      - alert: WebhookDeliveryFailureRate
        expr: |
          rate(velox_webhook_deliveries_total{status="failed"}[1h])
          / (rate(velox_webhook_deliveries_total{status="succeeded"}[1h]) + rate(velox_webhook_deliveries_total{status="failed"}[1h]))
          > 0.1
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Webhook delivery failure rate exceeds 10%"
          description: "{{ $value | humanizePercentage }} of webhook deliveries are failing. Check endpoint health."

  # -----------------------------------------------------------------------
  # API Health
  # -----------------------------------------------------------------------
  - name: velox-api
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(velox_http_requests_total{status=~"5.."}[5m]))
          / sum(rate(velox_http_requests_total[5m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "API 5xx error rate exceeds 5%"
          description: "{{ $value | humanizePercentage }} of requests returning 5xx. Check application logs."

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(velox_http_request_duration_seconds_bucket[5m])) > 5
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "API p99 latency exceeds 5 seconds"
          description: "p99 latency is {{ $value | humanize }}s. Check database performance and connection pool."

      - alert: RateLimitingDegraded
        expr: absent(velox_http_requests_total) == 1
        for: 5m
        labels:
          severity: info
          team: platform
        annotations:
          summary: "No HTTP requests recorded — metrics may be stale"

  # -----------------------------------------------------------------------
  # Database & Infrastructure
  # -----------------------------------------------------------------------
  - name: velox-infrastructure
    rules:
      - alert: AuditLogFailures
        expr: rate(velox_audit_failures_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Audit log writes are failing"
          description: "{{ $value | humanize }} audit write failures/sec. Compliance audit trail may have gaps."

      - alert: HighRequestsInFlight
        expr: velox_http_requests_in_flight > 100
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Over 100 concurrent HTTP requests"
          description: "{{ $value }} requests in flight. Server may be overloaded."

  # -----------------------------------------------------------------------
  # Dunning
  # -----------------------------------------------------------------------
  - name: velox-dunning
    rules:
      - alert: DunningBacklogGrowing
        expr: rate(velox_dunning_runs_processed_total[1h]) == 0 and velox_dunning_runs_processed_total > 0
        for: 2h
        labels:
          severity: warning
          team: billing
        annotations:
          summary: "No dunning runs processed in 2 hours"
          description: "Dunning processor may be stalled. Failed payments are not being retried."

  # -----------------------------------------------------------------------
  # Coupons
  # -----------------------------------------------------------------------
  - name: velox-coupons
    rules:
      - alert: CouponRedeemLatencyHigh
        expr: |
          histogram_quantile(0.95,
            rate(velox_http_request_duration_seconds_bucket{path="/v1/coupons/redeem"}[10m])
          ) > 0.5
        for: 10m
        labels:
          severity: warning
          team: billing
        annotations:
          summary: "Coupon redeem p95 latency > 500ms"
          description: "p95 = {{ $value | humanize }}s. Redeem is a transactional hot path — a regression here usually means contention on coupons / coupon_redemptions or a slow IdempotencyKey lookup."

      - alert: CouponRedeemErrorRateHigh
        # Ratio of non-success, non-validation redeem responses over 15m.
        # "error" is the untyped DB/infra failure bucket; we ignore
        # business-rule rejections (coupon_expired, coupon_min_amount_not_met,
        # …) since those are working-as-intended user errors.
        expr: |
          rate(velox_coupon_redemptions_total{outcome="error"}[15m])
          / (sum(rate(velox_coupon_redemptions_total[15m])) > 0)
          > 0.05
        for: 10m
        labels:
          severity: critical
          team: billing
        annotations:
          summary: "Coupon redeem infra error rate > 5%"
          description: "{{ $value | humanizePercentage }} of redeem attempts are returning 5xx or untyped errors. Check DB connectivity and the coupon service logs."
