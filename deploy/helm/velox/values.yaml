# Velox Helm chart — default values
#
# This chart targets generic Kubernetes (kind/k3s/EKS-compatible). The
# reference single-VM deploy lives at `deploy/compose/`; Helm is for
# users who already operate K8s.
#
# Defaults below match the v1 single-replica + external-Postgres posture
# (RDS, Cloud SQL, Supabase, Neon, etc). All env-var keys mirror the
# binary's actual reads from `internal/config/config.go` plus the
# per-package `os.Getenv` callsites — no invented keys.

# ---------------------------------------------------------------------
# Replicas — start at 1. The v1 scheduler is leader-elected via Postgres
# advisory locks (internal/billing/postgres_locker.go) so multi-replica
# is safe, but it's not required for typical self-host volumes.
# ---------------------------------------------------------------------
replicaCount: 1

image:
  repository: ghcr.io/sagarsuperuser/velox
  # Pin a tag for reproducibility. Empty falls back to .Chart.AppVersion.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Create a dedicated ServiceAccount. Set to false to use the namespace's
  # default SA — usually fine for a self-host deploy.
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

# Default off — most operators terminate TLS at their existing ingress
# (ALB / Cloudflare / nginx) and don't want the chart fighting them.
ingress:
  enabled: false
  className: nginx
  host: api.velox.example.com
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    secretName: velox-tls

resources:
  limits:
    memory: 512Mi
    cpu: 500m
  requests:
    memory: 256Mi
    cpu: 100m

# HPA is gated; v1 single-replica defaults make this premature. Flip on
# only when you've sized the workload and confirmed multiple replicas
# are needed (multi-replica is safe — Postgres advisory-lock leader
# election handles it).
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPU: 70

# Liveness / readiness probes hit the binary's two health endpoints.
# /health is process-up, /health/ready also gates on DB + scheduler.
probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

# Match the binary's outbox-flush window so in-flight requests drain
# rather than 502 on rolling deploys.
terminationGracePeriodSeconds: 30

# ---------------------------------------------------------------------
# Non-secret runtime config — ConfigMap. Mirrors the non-secret keys
# from deploy/compose/.env.example.
# ---------------------------------------------------------------------
config:
  # APP_ENV: local | staging | production. Production is the safe
  # default for self-host (turns on encryption-key fatal check, secure
  # cookies, HSTS).
  appEnv: production

  # PORT inside the container. Match service.port if you change it.
  port: "8080"

  # RUN_MIGRATIONS_ON_BOOT — apply pending migrations on `velox serve`
  # startup. True keeps the install one-shot; flip to false if you run
  # `velox migrate` out-of-band.
  runMigrations: true

  # CORS_ALLOWED_ORIGINS — comma-separated allowlist. Empty leaves the
  # binary's default; pin to your dashboard origin in production.
  corsAllowedOrigins: ""

  # DB pool tuning (defaults from internal/config/config.go).
  db:
    maxOpenConns: ""
    maxIdleConns: ""
    connMaxLifetimeMin: ""
    connMaxIdleTimeSec: ""
    pingTimeoutSec: ""
    queryTimeoutMs: ""
    sslMode: ""

  # Public URLs rendered into emails / portal redirects. Optional —
  # the binary leaves them blank and emails just don't link out.
  hostedInvoiceBaseUrl: ""
  paymentUpdateUrl: ""
  paymentUpdateReturnUrl: ""
  customerPortalUrl: ""
  stripeCheckoutSuccessUrl: ""
  stripeCheckoutCancelUrl: ""

  # Dashboard URLs for outbound emails (password reset, invites).
  dashboardUrl: ""
  dashboardPasswordResetUrl: ""
  dashboardInviteUrl: ""
  cookieDomain: ""

  # Billing-alert evaluator tick (e.g. "1m", "5m"). Defaults to 1h.
  billingAlertsInterval: ""

  # OpenTelemetry export. Noop when unset.
  otelEndpoint: ""
  otelServiceName: ""

# ---------------------------------------------------------------------
# Database connection — pick ONE shape:
#   externalDatabase.url  — single DATABASE_URL connection string
#   externalDatabase.host — split DB_HOST/DB_NAME/DB_USER/DB_PASSWORD
# Default targets external Postgres (matches the v1 single-VM-plus-RDS
# posture). The chart does NOT bundle a Postgres subchart — running a
# stateful Postgres inside the API release is an anti-pattern at
# production scale.
# ---------------------------------------------------------------------
externalDatabase:
  # Set url to a postgres://… string and leave host empty, OR set host
  # and the split fields and leave url empty. Setting both is an error
  # caught by the binary's loadDatabaseURL.
  url: ""
  host: ""
  port: "5432"
  name: "velox"
  user: "velox"
  # Password ALWAYS lives in a Secret. Set secrets.dbPassword instead
  # of editing this field; this stays empty.
  password: ""

# ---------------------------------------------------------------------
# Secrets — written into a Kubernetes Secret. Empty values are omitted
# from stringData entirely, so unset optional secrets stay absent
# rather than surfacing as empty strings.
#
# To use an externally-managed Secret (External Secrets Operator,
# sealed-secrets, ESO with AWS Secrets Manager), set
# secrets.existingSecret to its name and the chart skips the Secret
# template; deployment.yaml still mounts it via envFrom.secretRef.
# ---------------------------------------------------------------------
secrets:
  existingSecret: ""

  # REQUIRED for production — the binary refuses to start without
  # VELOX_ENCRYPTION_KEY when APP_ENV=production.
  encryptionKey: ""        # 64 hex chars (openssl rand -hex 32)
  bootstrapToken: ""       # one-shot POST /v1/bootstrap auth token

  # Database password (preferred over externalDatabase.password —
  # keeps the password out of the ConfigMap entirely).
  dbPassword: ""

  # Optional — Stripe inbound webhook signing secret. Per-tenant
  # Stripe API keys live in the database (migration 0032), not here.
  stripeWebhookSecret: ""

  # Optional — outbound email. Velox always enqueues; SMTP dispatcher
  # noops if SMTP_HOST is empty.
  smtpHost: ""
  smtpPort: ""
  smtpUsername: ""
  smtpPassword: ""
  smtpFrom: ""

  # Optional — Redis for distributed rate limiting (fails open if unset).
  redisUrl: ""

  # Optional — bearer token gating GET /metrics. Leave empty to expose
  # metrics anonymously behind your ingress.
  metricsToken: ""
