{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "velox.secretName" . }}
  labels:
    {{- include "velox.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ---- REQUIRED for production
  {{- with .Values.secrets.encryptionKey }}
  VELOX_ENCRYPTION_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.bootstrapToken }}
  VELOX_BOOTSTRAP_TOKEN: {{ . | quote }}
  {{- end }}

  # ---- Database connection — pick one shape:
  #      a) full DATABASE_URL (externalDatabase.url)
  #      b) split host (in ConfigMap) + DB_PASSWORD secret
  {{- if .Values.externalDatabase.url }}
  DATABASE_URL: {{ .Values.externalDatabase.url | quote }}
  {{- else if or .Values.secrets.dbPassword .Values.externalDatabase.password }}
  DB_PASSWORD: {{ default .Values.externalDatabase.password .Values.secrets.dbPassword | quote }}
  {{- end }}

  # ---- Optional inbound webhook signing
  {{- with .Values.secrets.stripeWebhookSecret }}
  STRIPE_WEBHOOK_SECRET: {{ . | quote }}
  {{- end }}

  # ---- Optional outbound email
  {{- with .Values.secrets.smtpHost }}
  SMTP_HOST: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.smtpPort }}
  SMTP_PORT: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.smtpUsername }}
  SMTP_USERNAME: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.smtpPassword }}
  SMTP_PASSWORD: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.smtpFrom }}
  SMTP_FROM: {{ . | quote }}
  {{- end }}

  # ---- Optional Redis (rate-limiting fails open if unset)
  {{- with .Values.secrets.redisUrl }}
  REDIS_URL: {{ . | quote }}
  {{- end }}

  # ---- Optional metrics bearer
  {{- with .Values.secrets.metricsToken }}
  METRICS_TOKEN: {{ . | quote }}
  {{- end }}
{{- end }}
