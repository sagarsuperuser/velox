apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "velox.fullname" . }}-config
  labels:
    {{- include "velox.labels" . | nindent 4 }}
data:
  RUN_MIGRATIONS_ON_BOOT: {{ .Values.config.runMigrations | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  APP_ENV: {{ .Values.config.appEnv | quote }}
  PORT: "8080"
  CORS_ALLOWED_ORIGINS: {{ .Values.config.corsOrigins | quote }}
