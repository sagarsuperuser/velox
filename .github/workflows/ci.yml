name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: velox
          POSTGRES_USER: velox
          POSTGRES_PASSWORD: velox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'

      - name: Build
        run: go build ./...

      - name: Verify modules
        run: go mod verify

      - name: Unit Tests (with race detector)
        run: go test ./... -race -short -count=1 -coverprofile=coverage.out

      - name: Vet
        run: go vet ./...

      - name: Vulnerability check
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

      - name: Create test database and app user
        run: |
          # velox_app is referenced by migration GRANT statements (source of
          # truth is docker/init.sql for local dev). It must exist cluster-wide
          # before migrations run or they fail with "role does not exist".
          #
          # Separate -c invocations: CREATE DATABASE cannot run inside a
          # transaction block, and psql wraps multi-statement -c in a txn.
          PGPASSWORD=velox psql -h localhost -U velox -d velox \
            -c "CREATE ROLE velox_app WITH LOGIN PASSWORD 'velox_app';" \
            -c "CREATE DATABASE velox_test OWNER velox;"
          PGPASSWORD=velox psql -h localhost -U velox -d velox_test -c "
            CREATE EXTENSION IF NOT EXISTS pgcrypto;
            CREATE ROLE velox_test_app WITH LOGIN PASSWORD 'velox_test_app';
            GRANT ALL PRIVILEGES ON DATABASE velox_test TO velox_test_app;
            GRANT ALL ON SCHEMA public TO velox_test_app;
            ALTER DEFAULT PRIVILEGES FOR ROLE velox IN SCHEMA public GRANT ALL ON TABLES TO velox_test_app;
            ALTER DEFAULT PRIVILEGES FOR ROLE velox IN SCHEMA public GRANT ALL ON SEQUENCES TO velox_test_app;
          "

      - name: Integration Tests
        run: go test -p 1 ./... -count=1 -short=false
        env:
          TEST_ADMIN_DATABASE_URL: postgres://velox:velox@localhost:5432/velox_test?sslmode=disable
          TEST_DATABASE_URL: postgres://velox_test_app:velox_test_app@localhost:5432/velox_test?sslmode=disable

      - name: Upload Coverage
        uses: codecov/codecov-action@v6
        with:
          file: coverage.out
        continue-on-error: true

  # Golden path: the README quickstart + scripts/demo.sh, executed for real.
  # This is the whole wedge chain in one run — recipe → test-clock customer →
  # LiteLLM-shaped token ingest → provider cost rates → simulated month →
  # finalized invoice with per-(model, token_type) lines + PDF → margin
  # report. demo.sh fails loudly at the first API mismatch, so this job is
  # what keeps the front door structurally unable to lie again (it rotted
  # silently for months once — front-door audit 2026-07-05, PR #374).
  golden-path:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: velox
          POSTGRES_USER: velox
          POSTGRES_PASSWORD: velox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://velox:velox@localhost:5432/velox?sslmode=disable
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'

      - name: Create app role (migrations GRANT to it)
        run: |
          PGPASSWORD=velox psql -h localhost -U velox -d velox             -c "CREATE ROLE velox_app WITH LOGIN PASSWORD 'velox_app';"             -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Bootstrap (migrations + demo tenant + keys)
        run: |
          go run ./cmd/velox-bootstrap | tee bootstrap.out
          grep -oE 'vlx_secret_test_[a-f0-9]+' bootstrap.out | head -1 > secret.key
          test -s secret.key

      - name: Start API
        run: |
          nohup go run ./cmd/velox > server.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/health >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "server never became healthy"; tail -50 server.log; exit 1

      - name: Run the golden path (scripts/demo.sh)
        run: ./scripts/demo.sh "$(cat secret.key)"

      - name: Server log on failure
        if: failure()
        run: tail -100 server.log || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'

      - uses: golangci/golangci-lint-action@v7

      # ADR-030 guard: bare `time.Now()` in service / store / engine
      # code on clock-pinned-entity domains leaks wall-clock into
      # rows that catchup queries read against frozen_time. Run as
      # part of the lint job (no extra runner cost) — the script
      # exits non-zero with a helpful message on any violation.
      - name: lint-clock (ADR-030)
        run: make lint-clock

      # Funding-set invariant: a period can be funded by >1 invoice, so
      # period-wide credit/clawback/void must reconcile against
      # FindFundingInvoicesForPeriod, not a single-row lookup. Flags new
      # unjustified single-invoice lookups (the class that caused the 2026-06-15
      # multi-invoice proration bugs). Bypass a legitimate use with a same/
      # preceding-line `// single-invoice-ok: <reason>`.
      - name: lint-funding-set (ADR-048 amendment)
        run: make lint-funding-set

      # Anti-rot guard: fail if MANUAL_TEST.md names a metric / column / table /
      # meter-key the code no longer has. CI catches generated-artifact drift but
      # not prose; this is the cheap prose guard ("a flow that lies is worse than
      # no flow"). Bypass a legitimate mention with a `currency-ok:` HTML comment.
      - name: lint-manual-test (doc currency)
        run: make lint-manual-test

      # Timezone-display invariant (ADR-076): a civil-day .Format() must render
      # in an explicit .In(loc) zone, never the process/host zone or a stray
      # .UTC() on a customer date; and the ADR-075 process-UTC pin must be
      # present. A green run is a machine-checked proof the invariant holds — it
      # turns the reactive ADR-074/075 audits (~8 fixed render-site bugs) into a
      # permanent gate. Bypass a genuine UTC/filename case with a same-line //tz:ok.
      - name: lint-tz (ADR-076)
        run: make lint-tz

  # codegen-drift fails the build when api/openapi.yaml has been edited
  # without regenerating the Go and TS artifacts that derive from it
  # (or vice versa — when a generated file was hand-edited). The check
  # is `make gen && git diff --exit-code`: regenerate everything from
  # the canonical spec, then assert nothing in the working tree
  # changed. Same pattern Stripe uses internally to keep its SDK
  # repos in sync with the openapi repo.
  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install web-v2 deps
        run: cd web-v2 && npm install --legacy-peer-deps

      - name: Regenerate from api/openapi.yaml
        run: make gen

      - name: Fail on uncommitted regenerated files
        run: |
          if ! git diff --exit-code; then
            echo "::error::api/openapi.yaml drift: regenerated files differ from committed copies. Run 'make gen' locally and commit the result."
            exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install and build frontend
        # `npm run build` = `tsc -b && vite build` — the strict project-
        # references build (tsconfig.app.json: noUnusedLocals etc.). The old
        # `npx tsc --noEmit` used the looser root config and `vite build`
        # strips types without checking, so production type errors (incl.
        # genuine bugs) accumulated invisibly. The production build is the gate.
        run: cd web-v2 && npm install --legacy-peer-deps && npm run build

  docker:
    needs: [test, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}:${{ github.sha }}
          artifact-name: velox-sbom.spdx.json
          format: spdx-json
          output-file: velox-sbom.spdx.json

      - name: Scan SBOM (Grype)
        uses: anchore/scan-action@v7
        with:
          sbom: velox-sbom.spdx.json
          fail-build: true
          severity-cutoff: critical

      - name: Sign image (Cosign)
        uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes ghcr.io/${{ github.repository }}:${{ github.sha }}
        env:
          COSIGN_EXPERIMENTAL: "1"
