name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: velox
          POSTGRES_USER: velox
          POSTGRES_PASSWORD: velox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: go build ./...

      - name: Verify modules
        run: go mod verify

      - name: Unit Tests (with race detector)
        run: go test ./... -race -short -count=1 -coverprofile=coverage.out

      - name: Vet
        run: go vet ./...

      - name: Vulnerability check
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
        continue-on-error: true

      - name: Create app user
        run: |
          PGPASSWORD=velox psql -h localhost -U velox -d velox -c "
            CREATE ROLE velox_app WITH LOGIN PASSWORD 'velox_app';
            GRANT ALL PRIVILEGES ON DATABASE velox TO velox_app;
            GRANT ALL ON SCHEMA public TO velox_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO velox_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO velox_app;
          "

      - name: Integration Tests
        run: go test -p 1 ./... -count=1 -short=false
        env:
          TEST_ADMIN_DATABASE_URL: postgres://velox:velox@localhost:5432/velox?sslmode=disable
          TEST_DATABASE_URL: postgres://velox_app:velox_app@localhost:5432/velox?sslmode=disable

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: golangci/golangci-lint-action@v7

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build frontend
        run: cd web-v2 && npm ci && npx tsc --noEmit && npx vite build

  docker:
    needs: [test, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for Cosign keyless signing
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Container vulnerability scanning — fail on critical/high CVEs
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # Generate SBOM (Software Bill of Materials) for supply chain transparency
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}:${{ github.sha }}
          artifact-name: velox-sbom.spdx.json
          format: spdx-json

      # Scan SBOM for known vulnerabilities
      - name: Scan SBOM (Grype)
        uses: anchore/scan-action@v5
        with:
          sbom: velox-sbom.spdx.json
          fail-build: true
          severity-cutoff: high

      # Sign the container image (keyless via Sigstore/Fulcio)
      # Verifiers can confirm the image was built by this CI pipeline
      - name: Sign image (Cosign)
        uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes ghcr.io/${{ github.repository }}:${{ github.sha }}
        env:
          COSIGN_EXPERIMENTAL: "1"
