name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: velox
          POSTGRES_USER: velox
          POSTGRES_PASSWORD: velox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build
        run: go build ./...

      - name: Verify modules
        run: go mod verify

      - name: Unit Tests (with race detector)
        run: go test ./... -race -short -count=1 -coverprofile=coverage.out

      - name: Vet
        run: go vet ./...

      - name: Vulnerability check
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
        continue-on-error: true

      - name: Create test database and app user
        run: |
          PGPASSWORD=velox psql -h localhost -U velox -d velox -c "
            CREATE DATABASE velox_test OWNER velox;
          "
          PGPASSWORD=velox psql -h localhost -U velox -d velox_test -c "
            CREATE EXTENSION IF NOT EXISTS pgcrypto;
            CREATE ROLE velox_test_app WITH LOGIN PASSWORD 'velox_test_app';
            GRANT ALL PRIVILEGES ON DATABASE velox_test TO velox_test_app;
            GRANT ALL ON SCHEMA public TO velox_test_app;
            ALTER DEFAULT PRIVILEGES FOR ROLE velox IN SCHEMA public GRANT ALL ON TABLES TO velox_test_app;
            ALTER DEFAULT PRIVILEGES FOR ROLE velox IN SCHEMA public GRANT ALL ON SEQUENCES TO velox_test_app;
          "

      - name: Verify test DB
        run: |
          PGPASSWORD=velox psql -h localhost -U velox -d velox_test -c "SELECT extname FROM pg_extension WHERE extname = 'pgcrypto'"
          PGPASSWORD=velox psql -h localhost -U velox -d velox_test -c "SELECT current_user, current_database()"
          PGPASSWORD=velox psql -h localhost -U velox -d velox_test -c "CREATE TABLE _test_probe (id int); DROP TABLE _test_probe;"

      - name: Integration Tests
        run: go test -p 1 ./... -count=1 -short=false
        env:
          TEST_ADMIN_DATABASE_URL: postgres://velox:velox@localhost:5432/velox_test?sslmode=disable
          TEST_DATABASE_URL: postgres://velox_test_app:velox_test_app@localhost:5432/velox_test?sslmode=disable

      - name: Upload Coverage
        uses: codecov/codecov-action@v6
        with:
          file: coverage.out
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - uses: golangci/golangci-lint-action@v7

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install and build frontend
        run: cd web-v2 && npm install && npx tsc --noEmit && npx vite build

  docker:
    needs: [test, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}:${{ github.sha }}
          artifact-name: velox-sbom.spdx.json
          format: spdx-json
          output-file: velox-sbom.spdx.json

      - name: Scan SBOM (Grype)
        uses: anchore/scan-action@v7
        with:
          sbom: velox-sbom.spdx.json
          fail-build: true
          severity-cutoff: critical

      - name: Sign image (Cosign)
        uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes ghcr.io/${{ github.repository }}:${{ github.sha }}
        env:
          COSIGN_EXPERIMENTAL: "1"
