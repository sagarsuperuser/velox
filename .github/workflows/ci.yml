name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
        continue-on-error: true  # golangci-lint may not support Go 1.25 yet

      - name: Unit Tests
        run: go test ./... -short -count=1 -coverprofile=coverage.out

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
        continue-on-error: true

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: velox
          POSTGRES_USER: velox
          POSTGRES_PASSWORD: velox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Create app user
        run: |
          PGPASSWORD=velox psql -h localhost -U velox -d velox -c "
            CREATE ROLE velox_app WITH LOGIN PASSWORD 'velox_app';
            GRANT ALL PRIVILEGES ON DATABASE velox TO velox_app;
            GRANT ALL ON SCHEMA public TO velox_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO velox_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO velox_app;
          "

      - name: Integration Tests
        run: go test -p 1 ./... -count=1 -short=false
        env:
          TEST_ADMIN_DATABASE_URL: postgres://velox:velox@localhost:5432/velox?sslmode=disable
          TEST_DATABASE_URL: postgres://velox_app:velox_app@localhost:5432/velox?sslmode=disable

  docker:
    runs-on: ubuntu-latest
    needs: [build, integration]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t velox:latest .

      - name: Verify image
        run: docker run --rm velox:latest --help || true
